<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gridiron Legends - RPG Football Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a12;
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
    z-index: 100;
    transition: color .2s;
  }
  .back-link:hover { color: #fff; }

  header {
    text-align: center;
    padding: 28px 16px 8px;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 36px);
    background: linear-gradient(135deg, #f5c842, #e8922d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  header p {
    font-size: 13px;
    color: #777;
    margin-top: 4px;
  }

  .card-counter {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #f5c842;
    margin: 10px 0 6px;
  }

  /* ── Swiper container ── */
  .swiper-area {
    position: relative;
    width: 100%;
    max-width: 400px;
    height: 580px;
    perspective: 1000px;
    touch-action: pan-y;
    margin: 0 auto;
  }

  /* ── Card ── */
  .card {
    position: absolute;
    width: 92%;
    left: 4%;
    top: 0;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    transition: transform .35s ease, opacity .35s ease;
    cursor: grab;
    user-select: none;
    will-change: transform;
    display: flex;
    flex-direction: column;
  }
  .card.active { z-index: 10; }
  .card.next { z-index: 5; transform: scale(.95) translateY(12px); opacity: .6; }
  .card.hidden { display: none; }

  /* outer border gradient */
  .card-border {
    flex: 1;
    border-radius: 16px;
    padding: 3px;
    display: flex;
    flex-direction: column;
  }

  .card-inner {
    flex: 1;
    background: #111118;
    border-radius: 13px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Portrait area ── */
  .card-portrait {
    height: 190px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-portrait::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: linear-gradient(transparent, #111118);
  }
  .portrait-icon {
    font-size: 90px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
    z-index: 1;
  }

  /* OVR badge */
  .ovr-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: rgba(0,0,0,.7);
    border: 2px solid;
    border-radius: 10px;
    padding: 4px 10px;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 22px;
    z-index: 2;
    line-height: 1;
  }
  .ovr-label {
    font-size: 8px;
    letter-spacing: 2px;
    display: block;
    text-align: center;
    opacity: .7;
  }

  /* Position badge */
  .pos-badge {
    position: absolute;
    top: 10px;
    left: 12px;
    background: rgba(0,0,0,.7);
    border: 2px solid;
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    z-index: 2;
    letter-spacing: 1px;
  }

  /* ── Card body ── */
  .card-body {
    flex: 1;
    padding: 12px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 900;
    text-align: center;
    line-height: 1.15;
  }
  .player-nickname {
    font-size: 12px;
    text-align: center;
    opacity: .6;
    font-style: italic;
    margin-top: -4px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 14px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 42px;
    flex-shrink: 0;
    opacity: .7;
  }
  .stat-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .6s ease;
  }
  .stat-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    width: 18px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Personality */
  .personality-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .personality-tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Abilities */
  .abilities-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
  }
  .ability-chip {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    white-space: nowrap;
  }
  .ability-chip .ability-type {
    font-size: 8px;
    opacity: .5;
    margin-right: 3px;
    text-transform: uppercase;
  }

  /* Info button */
  .info-btn {
    display: block;
    margin: 4px auto 0;
    background: none;
    border: 1px solid rgba(255,255,255,.2);
    color: #ccc;
    padding: 5px 24px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
  }
  .info-btn:hover { border-color: #f5c842; color: #f5c842; }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 16px;
    margin: 16px 0 10px;
    align-items: center;
  }
  .ctrl-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.04);
    color: #ccc;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .2s;
  }
  .ctrl-btn:hover { border-color: #f5c842; color: #f5c842; }
  .ctrl-btn:active { transform: scale(.9); }

  .swipe-hint {
    font-size: 11px;
    color: #555;
    margin-bottom: 20px;
  }

  /* ── Mode switcher ── */
  .mode-switch {
    display: flex;
    gap: 6px;
    margin: 8px 0 14px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 24px;
    padding: 4px;
  }
  .mode-btn {
    background: none;
    border: none;
    color: #999;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
  }
  .mode-btn.active {
    background: linear-gradient(135deg, #f5c842, #e8922d);
    color: #111;
  }
  .mode-btn:hover:not(.active) { color: #fff; }

  /* ── Battle mode ── */
  .battle-view { display: none; flex-direction: column; align-items: center; width: 100%; }
  .battle-view.active { display: flex; }
  .collection-view { display: flex; flex-direction: column; align-items: center; width: 100%; }
  .collection-view.hidden { display: none; }

  .scoreboard {
    display: flex;
    gap: 16px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    margin-bottom: 12px;
  }
  .score-box {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px;
    padding: 8px 14px;
    text-align: center;
  }
  .score-box .score-label {
    font-size: 8px;
    opacity: .6;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .score-box.you { border-color: #2ecc71; color: #2ecc71; }
  .score-box.cpu { border-color: #e74c3c; color: #e74c3c; }
  .score-box.round { color: #f5c842; border-color: #f5c842; }

  .battle-arena {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    padding: 0 12px;
  }

  .battle-slot-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    opacity: .6;
    margin-top: 4px;
  }
  .battle-slot-label.you { color: #2ecc71; }
  .battle-slot-label.cpu { color: #e74c3c; }

  .battle-card-wrap {
    position: relative;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 360 / 430;
  }

  .battle-card {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform .45s ease, opacity .45s ease;
  }
  .battle-card.face-down {
    background: repeating-linear-gradient(45deg, #1a1a26, #1a1a26 10px, #22222e 10px, #22222e 20px);
    border: 2px solid #333;
    align-items: center;
    justify-content: center;
    color: #f5c842;
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
  }
  .battle-card.face-down::before {
    content: 'GL';
    font-size: 54px;
    text-shadow: 0 0 18px rgba(245, 200, 66, 0.4);
  }

  .battle-card-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #111118;
    border-radius: 12px;
  }
  .battle-card-border {
    flex: 1;
    border-radius: 14px;
    padding: 3px;
    display: flex;
    flex-direction: column;
  }
  .battle-portrait {
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .battle-portrait .portrait-icon { font-size: 68px; }
  .battle-portrait .pos-badge { top: 8px; left: 8px; font-size: 10px; padding: 4px 8px; }
  .battle-portrait .ovr-badge { top: 8px; right: 8px; font-size: 18px; padding: 3px 8px; }
  .battle-body {
    flex: 1;
    padding: 8px 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .battle-body .player-name { font-size: 15px; }
  .battle-body .player-nickname { font-size: 10px; }

  .battle-stat-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,.03);
    border: 1px solid transparent;
    transition: all .2s;
  }
  .battle-stat-row.selectable { cursor: pointer; }
  .battle-stat-row.selectable:hover {
    background: rgba(245, 200, 66, .12);
    border-color: rgba(245, 200, 66, .4);
  }
  .battle-stat-row.picked {
    background: rgba(245, 200, 66, .18);
    border-color: #f5c842;
  }
  .battle-stat-row.win { background: rgba(46, 204, 113, .18); border-color: #2ecc71; }
  .battle-stat-row.lose { background: rgba(231, 76, 60, .18); border-color: #e74c3c; }

  .battle-stat-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 42px;
    flex-shrink: 0;
    opacity: .85;
  }
  .battle-stat-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .battle-stat-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .6s ease;
  }
  .battle-stat-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    width: 18px;
    text-align: right;
    flex-shrink: 0;
  }

  .battle-status {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #f5c842;
    min-height: 18px;
    text-align: center;
    margin: 10px 0 6px;
    letter-spacing: 1px;
  }
  .battle-status.win { color: #2ecc71; }
  .battle-status.lose { color: #e74c3c; }
  .battle-status.tie { color: #f5c842; }

  .battle-controls {
    display: flex;
    gap: 10px;
    margin: 6px 0 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .battle-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.04);
    color: #ccc;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
  }
  .battle-btn:hover:not(:disabled) { border-color: #f5c842; color: #f5c842; }
  .battle-btn:disabled { opacity: .35; cursor: not-allowed; }
  .battle-btn.primary {
    border-color: #f5c842;
    color: #f5c842;
    background: rgba(245, 200, 66, .08);
  }

  .battle-vs {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 900;
    color: #f5c842;
    letter-spacing: 3px;
    margin: 2px 0;
    opacity: .7;
  }

  /* ── Info Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal-card {
    background: #16161f;
    border-radius: 16px;
    max-width: 400px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
    border: 2px solid #333;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
  }
  .modal-close:hover { color: #fff; }

  .modal-header {
    text-align: center;
    margin-bottom: 16px;
  }
  .modal-header .portrait-icon { font-size: 60px; }
  .modal-name {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 900;
    margin-top: 8px;
  }
  .modal-pos-ovr {
    font-size: 13px;
    color: #999;
    margin-top: 2px;
  }

  .modal-section {
    margin-top: 16px;
  }
  .modal-section h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #f5c842;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .modal-bio {
    font-size: 14px;
    line-height: 1.6;
    color: #bbb;
  }
  .modal-stats-list {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .modal-stats-list li {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,.04);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .modal-stats-list .ms-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
  }
  .modal-abilities-list {
    list-style: none;
  }
  .modal-abilities-list li {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
    font-size: 13px;
  }
  .modal-abilities-list li:last-child { border-bottom: none; }
  .modal-abilities-list .ma-type {
    font-size: 10px;
    opacity: .5;
    text-transform: uppercase;
    margin-right: 6px;
  }
  .modal-personality {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid;
  }
  .modal-growth {
    font-size: 12px;
    color: #999;
    margin-top: 6px;
  }
</style>
</head>
<body>

<a href="/" class="back-link">&larr; Home</a>

<header>
  <h1>Gridiron Legends</h1>
  <p>RPG Football Player Cards</p>
</header>

<div class="mode-switch" role="tablist">
  <button class="mode-btn active" id="modeCollection" role="tab">COLLECTION</button>
  <button class="mode-btn" id="modeBattle" role="tab">BATTLE</button>
</div>

<div class="collection-view" id="collectionView">
  <div class="card-counter" id="counter">1 / 12</div>

  <div class="swiper-area" id="swiperArea"></div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn">&#8592;</button>
    <button class="ctrl-btn" id="nextBtn">&#8594;</button>
  </div>

  <p class="swipe-hint">Swipe or use arrows to browse</p>
</div>

<div class="battle-view" id="battleView">
  <div class="scoreboard">
    <div class="score-box you"><span class="score-label">YOU</span><span id="scoreYou">0</span></div>
    <div class="score-box round"><span class="score-label">ROUND</span><span id="scoreRound">1</span></div>
    <div class="score-box cpu"><span class="score-label">CPU</span><span id="scoreCpu">0</span></div>
  </div>

  <div class="battle-arena">
    <div class="battle-slot-label cpu">CPU</div>
    <div class="battle-card-wrap" id="cpuCardWrap"></div>

    <div class="battle-vs">VS</div>

    <div class="battle-card-wrap" id="youCardWrap"></div>
    <div class="battle-slot-label you">YOUR CARD &bull; tap a stat to challenge</div>
  </div>

  <div class="battle-status" id="battleStatus">Pick a stat to battle with!</div>

  <div class="battle-controls">
    <button class="battle-btn primary" id="nextRoundBtn" disabled>NEXT ROUND</button>
    <button class="battle-btn" id="resetBattleBtn">RESET</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const PLAYERS = [
  {
    name: "Marcus Johnson",
    nickname: "Thunder",
    position: "RB",
    ovr: 88,
    color: "#c0392b",
    icon: "\u{1F3C8}",

    personalityColor: "#e74c3c",
    growthEffect: "+Power growth, \u2212Awareness growth",
    abilities: [
      { type: "Active", name: "Stiff Arm" },
      { type: "Passive", name: "Intimidation Aura" },
      { type: "Reaction", name: "Brace for Impact" }
    ],
    bio: "A bruising back who punishes defenders at the point of attack. Built like a tank with a mean streak."
  },
  {

  },

    personalityColor: "#95a5a6",
    growthEffect: "Slower growth but higher stat ceiling",
    abilities: [
      { type: "Active", name: "Pancake Block" },
      { type: "Passive", name: "+Stamina Regen" }
    ],
    bio: "Slow to develop but becomes an immovable wall given time. Anchors any offensive line."
  },
  {
    name: "Zion Okafor",
    nickname: "The Wall",
    position: "DL",
    ovr: 87,
    color: "#27ae60",
    icon: "\u{1F4A5}",
    speed: 5, power: 10, hands: 6, awareness: 7,
    personality: "Aggressive",
    personalityColor: "#e74c3c",
    growthEffect: "+Power growth, \u2212Awareness growth",
    abilities: [
      { type: "Active", name: "Bull Rush" },
      { type: "Passive", name: "Intimidation Aura" },
      { type: "Reaction", name: "Brace for Impact" }
    ],
    bio: "Collapses pockets with raw power and a relentless motor. Offensive lines fear him."
  },
  {
    name: "Jasper Reeves",
    nickname: "Hawk",
    position: "S",
    ovr: 89,
    color: "#16a085",
    icon: "\u{1F985}",
    speed: 8, power: 6, hands: 8, awareness: 10,

let currentIndex = 0;
const swiperArea = document.getElementById('swiperArea');
const counter = document.getElementById('counter');
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');

function statColor(val) {
  if (val >= 9) return '#2ecc71';
  if (val >= 7) return '#f5c842';
  if (val >= 5) return '#e67e22';
  return '#e74c3c';
}

function buildCard(player, idx) {
  const card = document.createElement('div');
  card.className = 'card hidden';
  card.dataset.index = idx;

  const abilitiesHTML = player.abilities.map(a =>
    `<span class="ability-chip"><span class="ability-type">${a.type}</span>${a.name}</span>`
  ).join('');

  card.innerHTML = `
    <div class="card-border" style="background: linear-gradient(135deg, ${player.color}, #222);">
      <div class="card-inner">
        <div class="card-portrait" style="background: radial-gradient(circle at 50% 40%, ${player.color}33, transparent 70%), linear-gradient(180deg, ${player.color}22, #111118);">
          <div class="pos-badge" style="border-color: ${player.color}; color: ${player.color};">${player.position}</div>
          <div class="ovr-badge" style="border-color: ${player.color}; color: ${player.color};">
            <span class="ovr-label">OVR</span>
            ${player.ovr}
          </div>
          <div class="portrait-icon">${player.icon}</div>
        </div>
        <div class="card-body">
          <div class="player-name" style="color: ${player.color};">${player.name}</div>
          <div class="player-nickname">"${player.nickname}"</div>
          <div class="stats-grid">
            ${buildStatRow('SPD', player.speed, player.color)}
            ${buildStatRow('PWR', player.power, player.color)}
            ${buildStatRow('HND', player.hands, player.color)}
            ${buildStatRow('AWR', player.awareness, player.color)}
          </div>
          <div class="personality-row">
            <span class="personality-tag" style="border-color: ${player.personalityColor}; color: ${player.personalityColor};">${player.personality}</span>
          </div>
          <div class="abilities-row">${abilitiesHTML}</div>
          <button class="info-btn" onclick="openModal(${idx})">INFO</button>
        </div>
      </div>
    </div>
  `;
  return card;
}

function buildStatRow(label, val, color) {
  return `
    <div class="stat-row">
      <span class="stat-label">${label}</span>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${val * 10}%; background: ${statColor(val)};"></div>
      </div>
      <span class="stat-val" style="color: ${statColor(val)};">${val}</span>
    </div>
  `;
}

function renderCards() {
  swiperArea.innerHTML = '';
  PLAYERS.forEach((p, i) => {
    swiperArea.appendChild(buildCard(p, i));
  });
  updateDisplay();
}

function updateDisplay() {
  const cards = swiperArea.querySelectorAll('.card');
  cards.forEach((c, i) => {
    c.className = 'card hidden';
    if (i === currentIndex) c.className = 'card active';
    else if (i === currentIndex + 1) c.className = 'card next';
  });
  counter.textContent = `${currentIndex + 1} / ${PLAYERS.length}`;
}

function goNext() {
  if (currentIndex < PLAYERS.length - 1) {
    const active = swiperArea.querySelector('.card.active');
    if (active) {
      active.style.transform = 'translateX(-120%) rotate(-8deg)';
      active.style.opacity = '0';
    }
    setTimeout(() => {
      currentIndex++;
      updateDisplay();
      const newActive = swiperArea.querySelector('.card.active');
      if (newActive) {
        newActive.style.transform = '';
        newActive.style.opacity = '';
      }
    }, 200);
  }
}

function goPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    updateDisplay();
    const active = swiperArea.querySelector('.card.active');
    if (active) {
      active.style.transform = '';
      active.style.opacity = '';
    }
  }
}

/* Touch / mouse drag */
let startX = 0, deltaX = 0, dragging = false;
swiperArea.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  dragging = true;
}, { passive: true });
swiperArea.addEventListener('touchmove', e => {
  if (!dragging) return;
  deltaX = e.touches[0].clientX - startX;
  const active = swiperArea.querySelector('.card.active');
  if (active) {
    active.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.04}deg)`;
  }
}, { passive: true });
swiperArea.addEventListener('touchend', () => {
  dragging = false;
  if (deltaX < -60) goNext();
  else if (deltaX > 60) goPrev();
  else {
    const active = swiperArea.querySelector('.card.active');
    if (active) { active.style.transform = ''; active.style.opacity = ''; }
  }
  deltaX = 0;
});

/* Mouse drag */
swiperArea.addEventListener('mousedown', e => { startX = e.clientX; dragging = true; });
swiperArea.addEventListener('mousemove', e => {
  if (!dragging) return;
  deltaX = e.clientX - startX;
  const active = swiperArea.querySelector('.card.active');
  if (active) {
    active.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.04}deg)`;
  }
});
document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  if (deltaX < -60) goNext();
  else if (deltaX > 60) goPrev();
  else {
    const active = swiperArea.querySelector('.card.active');
    if (active) { active.style.transform = ''; active.style.opacity = ''; }
  }
  deltaX = 0;
});

/* Keyboard */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);

        <li><span>Awareness</span><span class="ms-val" style="color:${statColor(p.awareness)}">${p.awareness}</span></li>
      </ul>
    </div>
    <div class="modal-section">
      <h3>Personality</h3>
      <span class="modal-personality" style="border-color: ${p.personalityColor}; color: ${p.personalityColor};">${p.personality}</span>
      <p class="modal-growth">${p.growthEffect}</p>
    </div>
    <div class="modal-section">
      <h3>Abilities</h3>
      <ul class="modal-abilities-list">
        ${p.abilities.map(a => `<li><span class="ma-type">${a.type}</span>${a.name}</li>`).join('')}

  modal.classList.add('active');
}

function closeModal() { modal.classList.remove('active'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

renderCards();

/* ─────────────────────────────────────────────
   BATTLE MODE
   Top-Trumps style card game: draw a random
   card, pick a stat to challenge the CPU's
   random card. Higher wins the round.
   ───────────────────────────────────────────── */

const STAT_KEYS = [
  { key: 'speed', label: 'SPD', full: 'Speed' },
  { key: 'power', label: 'PWR', full: 'Power' },
  { key: 'hands', label: 'HND', full: 'Hands' },
  { key: 'awareness', label: 'AWR', full: 'Awareness' }
];

const battleState = {
  you: 0,
  cpu: 0,
  round: 1,
  youCard: null,
  cpuCard: null,
  resolved: false,
  cpuRevealed: false
};

const collectionView = document.getElementById('collectionView');
const battleView = document.getElementById('battleView');
const modeCollectionBtn = document.getElementById('modeCollection');
const modeBattleBtn = document.getElementById('modeBattle');
const youCardWrap = document.getElementById('youCardWrap');
const cpuCardWrap = document.getElementById('cpuCardWrap');
const battleStatus = document.getElementById('battleStatus');
const nextRoundBtn = document.getElementById('nextRoundBtn');
const resetBattleBtn = document.getElementById('resetBattleBtn');
const scoreYouEl = document.getElementById('scoreYou');
const scoreCpuEl = document.getElementById('scoreCpu');
const scoreRoundEl = document.getElementById('scoreRound');

function drawRandomPlayer(excludeIdx) {
  let idx;
  do {
    idx = Math.floor(Math.random() * PLAYERS.length);
  } while (idx === excludeIdx && PLAYERS.length > 1);
  return idx;
}

function buildBattleCardHTML(player, options = {}) {
  const { selectable = false, revealed = true, highlightStat = null, result = null } = options;
  if (!revealed) {
    return `<div class="battle-card face-down"></div>`;
  }
  const statsHTML = STAT_KEYS.map(s => {
    const val = player[s.key];
    let cls = 'battle-stat-row';
    if (selectable) cls += ' selectable';
    if (highlightStat === s.key) {
      cls += ' picked';
      if (result === 'win') cls += ' win';
      else if (result === 'lose') cls += ' lose';
    }
    const action = selectable ? `data-stat="${s.key}"` : '';
    return `
      <div class="${cls}" ${action}>
        <span class="battle-stat-label">${s.label}</span>
        <div class="battle-stat-bar-bg">
          <div class="battle-stat-bar-fill" style="width:${val * 10}%; background: ${statColor(val)};"></div>
        </div>
        <span class="battle-stat-val" style="color: ${statColor(val)};">${val}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="battle-card">
      <div class="battle-card-border" style="background: linear-gradient(135deg, ${player.color}, #222);">
        <div class="battle-card-inner">
          <div class="battle-portrait" style="background: radial-gradient(circle at 50% 40%, ${player.color}33, transparent 70%), linear-gradient(180deg, ${player.color}22, #111118);">
            <div class="pos-badge" style="border-color: ${player.color}; color: ${player.color};">${player.position}</div>
            <div class="ovr-badge" style="border-color: ${player.color}; color: ${player.color};">
              <span class="ovr-label">OVR</span>
              ${player.ovr}
            </div>
            <div class="portrait-icon">${player.icon}</div>
          </div>
          <div class="battle-body">
            <div class="player-name" style="color: ${player.color};">${player.name}</div>
            <div class="player-nickname">"${player.nickname}"</div>
            ${statsHTML}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderBattle(highlightStat = null, result = null) {
  const you = PLAYERS[battleState.youCard];
  const cpu = PLAYERS[battleState.cpuCard];

  cpuCardWrap.innerHTML = buildBattleCardHTML(cpu, {
    revealed: battleState.cpuRevealed,
    highlightStat,
    result: result ? (result === 'win' ? 'lose' : result === 'lose' ? 'win' : null) : null
  });

  youCardWrap.innerHTML = buildBattleCardHTML(you, {
    selectable: !battleState.resolved,
    revealed: true,
    highlightStat,
    result
  });

  if (!battleState.resolved) {
    youCardWrap.querySelectorAll('.battle-stat-row.selectable').forEach(row => {
      row.addEventListener('click', () => handleStatPick(row.dataset.stat));
    });
  }

  scoreYouEl.textContent = battleState.you;
  scoreCpuEl.textContent = battleState.cpu;
  scoreRoundEl.textContent = battleState.round;
}

function handleStatPick(statKey) {
  if (battleState.resolved) return;
  battleState.resolved = true;
  battleState.cpuRevealed = true;

  const you = PLAYERS[battleState.youCard];
  const cpu = PLAYERS[battleState.cpuCard];
  const youVal = you[statKey];
  const cpuVal = cpu[statKey];

  let result;
  let statusText;
  let statusClass = '';
  const statFull = STAT_KEYS.find(s => s.key === statKey).full;

  if (youVal > cpuVal) {
    result = 'win';
    battleState.you++;
    statusText = `YOU WIN! ${statFull} ${youVal} vs ${cpuVal}`;
    statusClass = 'win';
  } else if (youVal < cpuVal) {
    result = 'lose';
    battleState.cpu++;
    statusText = `CPU WINS ${statFull} ${cpuVal} vs ${youVal}`;
    statusClass = 'lose';
  } else {
    result = 'tie';
    statusText = `TIE! ${statFull} ${youVal} each`;
    statusClass = 'tie';
  }

  renderBattle(statKey, result);
  battleStatus.textContent = statusText;
  battleStatus.className = 'battle-status ' + statusClass;
  nextRoundBtn.disabled = false;
}

function newBattleRound() {
  battleState.round++;
  battleState.youCard = drawRandomPlayer(battleState.youCard);
  battleState.cpuCard = drawRandomPlayer(battleState.cpuCard);
  battleState.resolved = false;
  battleState.cpuRevealed = false;
  battleStatus.textContent = 'Pick a stat to battle with!';
  battleStatus.className = 'battle-status';
  nextRoundBtn.disabled = true;
  renderBattle();
}

function initBattle() {
  battleState.you = 0;
  battleState.cpu = 0;
  battleState.round = 1;
  battleState.youCard = drawRandomPlayer(-1);
  battleState.cpuCard = drawRandomPlayer(battleState.youCard);
  battleState.resolved = false;
  battleState.cpuRevealed = false;
  battleStatus.textContent = 'Pick a stat to battle with!';
  battleStatus.className = 'battle-status';
  nextRoundBtn.disabled = true;
  renderBattle();
}

nextRoundBtn.addEventListener('click', newBattleRound);
resetBattleBtn.addEventListener('click', initBattle);

/* Mode switching */
function setMode(mode) {
  if (mode === 'battle') {
    modeBattleBtn.classList.add('active');
    modeCollectionBtn.classList.remove('active');
    collectionView.classList.add('hidden');
    battleView.classList.add('active');
    if (battleState.youCard === null) initBattle();
  } else {
    modeCollectionBtn.classList.add('active');
    modeBattleBtn.classList.remove('active');
    battleView.classList.remove('active');
    collectionView.classList.remove('hidden');
  }
}
modeCollectionBtn.addEventListener('click', () => setMode('collection'));
modeBattleBtn.addEventListener('click', () => setMode('battle'));

/* Update collection counter to reflect dynamic roster size */
counter.textContent = `1 / ${PLAYERS.length}`;
