<footer class="site-footer">
  <div class="container site-footer__inner">
    <p class="site-footer__copy">
      🐾 &copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. Built with <a href="https://jekyllrb.com" target="_blank" rel="noopener noreferrer">Jekyll</a>.
    </p>
    <div class="site-footer__social">
      {% for link in site.author.links %}
      <a href="{{ link.url }}" class="social-link social-link--{{ link.icon }}" target="_blank" rel="noopener noreferrer" aria-label="{{ link.label }}">
        {% include icon-{{ link.icon }}.html %}
      </a>
      {% endfor %}
    </div>
  </div>
</footer>
