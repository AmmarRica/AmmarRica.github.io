<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-header__logo" href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" aria-label="Main navigation">
      <ul class="site-nav__list">
        {% for item in site.navigation %}
        <li class="site-nav__item">
          <a class="site-nav__link{% if page.url == item.url or item.url != '/' and page.url contains item.url %} site-nav__link--active{% endif %}"
             href="{{ item.url | relative_url }}">{{ item.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>

<script>
  (function() {
    var toggle = document.querySelector('.nav-toggle');
    var nav = document.querySelector('.site-nav');
    if (toggle && nav) {
      toggle.addEventListener('click', function() {
        var expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', !expanded);
        nav.classList.toggle('site-nav--open');
      });
    }
  })();
</script>
