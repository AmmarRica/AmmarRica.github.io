---
layout: default
---

<div class="page-header">
  <h1>{{ page.title }}</h1>
  <p class="muted">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    {% if page.categories.size > 0 %}
    &middot; <span class="label label-info">{{ page.categories | join: ", " }}</span>
    {% endif %}
  </p>
</div>

<div class="row-fluid">
  <div class="span9 post-body">
    {{ content }}

    <hr>
    <p><a href="{{ '/blog/' | relative_url }}" class="btn">&laquo; Back to Blog</a></p>
  </div>
  <div class="span3">
    <div class="well">
      <h5>About the author</h5>
      <p>{{ site.author.bio }}</p>
    </div>
  </div>
</div>
