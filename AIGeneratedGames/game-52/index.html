<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Dungeon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #0f0f1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 8px 10px 10px;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HUD */
  #hud {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    background: linear-gradient(180deg, #1a1a2e, #141428);
    border: 1px solid #3b3b5c;
    border-radius: 12px;
    padding: 7px;
    margin-bottom: 8px;
    font-size: 12px;
    flex-shrink: 0;
  }
  .stat {
    background: #0f0f1a;
    border-radius: 8px;
    padding: 5px 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
    border: 1px solid #2a2a44;
  }
  .stat .label { color: #8a8aa8; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
  .stat .val { color: #fbbf24; font-weight: 700; font-size: 15px; line-height: 1; }
  .stat.hp .val { color: #ef4444; }
  .stat.weapon .val { color: #a78bfa; }
  .stat.coin .val { color: #fbbf24; }
  .stat.level .val { color: #22c55e; }
  .stat.moves .val { color: #60a5fa; }
  .hp-bar {
    width: 100%;
    height: 4px;
    background: #2a1a1a;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2px;
  }
  .hp-bar > div {
    height: 100%;
    background: linear-gradient(90deg, #ef4444, #f87171);
    transition: width 0.3s;
  }

  /* Board wrapper — padding gives the "smaller cards" breathing room */
  #board-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 16px;
  }
  #board {
    display: grid;
    gap: 6px;
  }

  /* Card */
  .card {
    position: relative;
    aspect-ratio: 2 / 3;
    perspective: 800px;
    cursor: pointer;
    min-height: 40px;
  }
  .card-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner {
    transform: rotateY(180deg) scale(1);
    animation: matchPop 0.5s ease-out forwards;
  }
  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); opacity: 1; }
    40%  { transform: rotateY(180deg) scale(1.12); opacity: 1; }
    100% { transform: rotateY(180deg) scale(0.4); opacity: 0; }
  }

  /* Deal animation — cards fly in from above one at a time */
  @keyframes dealIn {
    0%   { transform: translateY(-180px) scale(0.65); opacity: 0; }
    55%  { opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .card.dealing {
    animation: dealIn 0.42s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }

  /* Damage shake — card element (doesn't conflict with flip transform on card-inner) */
  @keyframes cardShake {
    0%,100% { transform: translateX(0)    translateY(0); }
    15%     { transform: translateX(-8px) translateY(-2px); }
    30%     { transform: translateX(7px)  translateY(2px); }
    50%     { transform: translateX(-6px) translateY(-1px); }
    70%     { transform: translateX(6px)  translateY(1px); }
    88%     { transform: translateX(-3px); }
  }
  .card.shaking { animation: cardShake 0.46s ease-in-out; }

  /* HP stat shake */
  @keyframes hpShake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-5px); }
    45%     { transform: translateX(5px); }
    65%     { transform: translateX(-4px); }
    85%     { transform: translateX(4px); }
  }
  .stat.hp.shaking { animation: hpShake 0.35s ease-in-out; }

  /* Joker shuffle wiggle */
  @keyframes jokerWiggle {
    0%   { transform: scale(1) rotate(0deg); }
    20%  { transform: scale(1.15) rotate(8deg); }
    45%  { transform: scale(1.15) rotate(-8deg); }
    70%  { transform: scale(1.05) rotate(4deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .card.joker-acting .card-inner { animation: jokerWiggle 0.55s ease-in-out; }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }
  .card-back {
    background:
      repeating-linear-gradient(45deg, #4c2e8a 0 6px, #3b2570 6px 12px),
      #3b2570;
    border: 2px solid #a78bfa;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-back::after {
    content: '';
    width: 60%;
    height: 60%;
    border-radius: 50%;
    border: 2px solid #fbbf24;
    box-shadow: inset 0 0 10px rgba(251,191,36,0.4);
    background: radial-gradient(circle, rgba(251,191,36,0.2), transparent 70%);
  }
  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(180deg, #fefefe, #ededed);
    color: #1a1a2e;
    border: 2px solid #1a1a2e;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    padding: 4px;
  }
  .card-front.red     { color: #c81e1e; }
  .card-front.black   { color: #0a0a1a; }
  .card-front.rose    { color: #be185d; background: linear-gradient(180deg, #fff0f6, #fce7f3); border-color: #be185d; }
  .card-front.crimson { color: #991b1b; background: linear-gradient(180deg, #fff5f5, #fee2e2); border-color: #991b1b; }
  .card-front.slate   { color: #334155; background: linear-gradient(180deg, #f8fafc, #e2e8f0); border-color: #334155; }

  /* Playing-card pip layout */
  .pip-tl, .pip-br {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    font-weight: 800;
  }
  .pip-tl { top: 3px; left: 4px; }
  .pip-br { bottom: 3px; right: 4px; transform: rotate(180deg); }
  .pip-rank { font-size: clamp(9px, 2.8vw, 15px); }
  .pip-suit { font-size: clamp(8px, 2.4vw, 13px); }
  .pip-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 6vw, 30px);
  }

  /* Special cards */
  .card-front.special {
    background: linear-gradient(180deg, #1a1a2e, #2a1a3e);
    color: #fbbf24;
    border-color: #a78bfa;
  }
  .special-icon {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(20px, 8vw, 38px);
    filter: drop-shadow(0 0 6px currentColor);
  }
  .special-label {
    text-align: center;
    font-size: clamp(7px, 1.9vw, 10px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 0;
    background: rgba(0,0,0,0.3);
  }
  .card-front.coin   { color: #fbbf24; border-color: #fbbf24; }
  .card-front.weapon { color: #a78bfa; border-color: #a78bfa; }
  .card-front.heart  { color: #ef4444; border-color: #ef4444; }
  .card-front.enemy  { color: #22c55e; border-color: #22c55e; }
  .card-front.joker  {
    color: #f97316;
    border-color: #f97316;
    background: linear-gradient(160deg, #1a1208, #2a1a0e);
  }

  /* Toast messages */
  #toasts {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    pointer-events: none;
    z-index: 500;
  }
  .toast {
    background: rgba(26, 26, 46, 0.95);
    border: 1px solid #a78bfa;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    animation: toastLife 1.9s ease-out forwards;
    white-space: nowrap;
  }
  .toast.good   { border-color: #22c55e; color: #22c55e; }
  .toast.bad    { border-color: #ef4444; color: #ef4444; }
  .toast.gold   { border-color: #fbbf24; color: #fbbf24; }
  .toast.purple { border-color: #a78bfa; color: #a78bfa; }
  .toast.orange { border-color: #f97316; color: #f97316; }
  @keyframes toastLife {
    0%   { opacity: 0; transform: translateY(10px); }
    12%  { opacity: 1; transform: translateY(0); }
    75%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-18px); }
  }

  /* Overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 15, 26, 0.93);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 400;
    padding: 16px;
  }
  #overlay.hidden { display: none; }
  .panel {
    background: linear-gradient(180deg, #1a1a2e, #14142a);
    border: 1px solid #3b3b5c;
    border-radius: 16px;
    padding: 22px 20px 20px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-height: 88vh;
    overflow-y: auto;
  }
  .panel h1 {
    font-size: clamp(22px, 6vw, 28px);
    color: #fbbf24;
    text-shadow: 0 0 20px rgba(251,191,36,0.5);
    margin-bottom: 6px;
  }
  .panel h2 {
    font-size: clamp(15px, 4vw, 20px);
    color: #a78bfa;
    margin-bottom: 12px;
  }
  .panel p {
    color: #c0c0e0;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .panel ul {
    text-align: left;
    color: #c0c0e0;
    font-size: 13px;
    line-height: 1.8;
    margin: 0 auto 14px;
    padding-left: 20px;
    max-width: 300px;
  }
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
  }
  .panel button {
    background: #a78bfa;
    color: #0f0f1a;
    border: none;
    padding: 11px 24px;
    font-size: 15px;
    font-weight: 800;
    border-radius: 10px;
    cursor: pointer;
    min-height: 46px;
    min-width: 130px;
    transition: transform 0.1s, background 0.2s;
  }
  .panel button:hover, .panel button:active { background: #c4b5fd; transform: scale(1.03); }
  .panel button.secondary {
    background: #23233a;
    color: #c0c0e0;
    border: 1px solid #3b3b5c;
  }
  .panel button.secondary:hover { background: #2e2e50; color: #fff; }

  .stats-line {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 8px 0 14px;
    font-size: 13px;
  }
  .stats-line span { color: #fbbf24; font-weight: 700; }

  /* Best score banner on main menu */
  .best-banner {
    background: linear-gradient(90deg, #1a1a2e, #2a1832, #1a1a2e);
    border: 1px solid #a78bfa;
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #c0c0e0;
  }
  .best-banner .bv { color: #fbbf24; font-weight: 700; font-size: 17px; }

  /* High scores table */
  .score-table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 14px;
    font-size: 13px;
  }
  .score-table th {
    color: #8a8aa8;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 4px 6px;
    border-bottom: 1px solid #3b3b5c;
  }
  .score-table td {
    padding: 6px 6px;
    border-bottom: 1px solid #1e1e38;
    color: #c0c0e0;
  }
  .score-table tbody tr:first-child td { color: #fbbf24; font-weight: 700; }
  .score-table .rank  { color: #8a8aa8; text-align: center; width: 28px; }
  .score-table .lvls  { color: #22c55e; font-weight: 700; text-align: center; }
  .score-table .mvs   { color: #60a5fa; text-align: center; }
  .score-table .dt    { color: #8a8aa8; font-size: 11px; text-align: right; }
  .score-table tbody tr:first-child .rank { color: #fbbf24; }
  .score-table tbody tr:first-child .lvls { color: #fbbf24; }
  .score-table tbody tr:first-child .mvs  { color: #fbbf24; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat level"><span class="label">Dungeon</span><span class="val" id="hud-level">1</span></div>
    <div class="stat hp">
      <span class="label">HP</span>
      <span class="val" id="hud-hp">10/10</span>
      <div class="hp-bar"><div id="hud-hp-bar" style="width:100%"></div></div>
    </div>
    <div class="stat weapon"><span class="label">🗡️ Arms</span><span class="val" id="hud-weapons">0</span></div>
    <div class="stat coin"><span class="label">🪙 Gold</span><span class="val" id="hud-coins">0</span></div>
    <div class="stat moves"><span class="label">Moves</span><span class="val" id="hud-moves">0</span></div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>
</div>

<div id="toasts"></div>

<div id="overlay">
  <div class="panel" id="panel"></div>
</div>

<script>
(function () {
  'use strict';

  // ─── Constants ───────────────────────────────────────────────────────────────
  const COLS      = 4;
  const ROWS      = 4;
  const PAIRS     = (COLS * ROWS) / 2;   // 8 pairs = 16 cards
  const MAX_HP    = 10;
  // Cards are rendered at 2/3 of the available wrap space so padding shows
  const CARD_SCALE = 2 / 3;
  const HS_KEY    = 'memoryDungeon.scores.v1';

  const SUITS = [
    { s: '♠',  c: 'black'   },
    { s: '♥',  c: 'red'     },
    { s: '♦',  c: 'red'     },
    { s: '♣',  c: 'black'   },
    { s: '🌸', c: 'rose'    },
    { s: '🀄', c: 'crimson' },
    { s: '♟',  c: 'slate'   },
  ];
  // Only face-card ranks — no numbers
  const RANKS = ['A', 'K', 'Q', 'J'];
  const RANK_CENTER = { 'A': '⭐', 'K': '👑', 'Q': '💎', 'J': '⚡' };
  // Color per rank (no suits on pip cards — prevents confusion matching same-rank different-suit cards)
  const RANK_COLOR  = { 'A': 'black', 'K': 'black', 'Q': 'red', 'J': 'red' };

  // Unique enemy & weapon identity tables — index by typeIndex
  const ENEMY_DATA = [
    { icon: '👺', name: 'Goblin'   },
    { icon: '🧟', name: 'Zombie'   },
    { icon: '🐺', name: 'Werewolf' },
    { icon: '💀', name: 'Skeleton' },
    { icon: '🦇', name: 'Vampire'  },
    { icon: '🕷️', name: 'Spider'   },
  ];
  const WEAPON_DATA = [
    { icon: '🗡️', name: 'Dagger'  },
    { icon: '🏹', name: 'Bow'     },
    { icon: '⚔️', name: 'Sword'   },
    { icon: '🔱', name: 'Trident' },
  ];

  // ─── State ───────────────────────────────────────────────────────────────────
  const state = {
    level:        1,
    hp:           MAX_HP,
    maxHp:        MAX_HP,
    weapons:      0,
    coins:        0,
    totalMoves:   0,
    board:        [],   // card objects
    matched:      [],   // boolean per index
    seenCount:    [],   // how many times each position has been flipped (resets per level)
    flipped:      [],   // [a] or [a, b] — currently revealed indices
    busy:         false,
    dealing:      false,
    matchedCount: 0,
  };

  // ─── DOM ─────────────────────────────────────────────────────────────────────
  const boardEl   = document.getElementById('board');
  const overlayEl = document.getElementById('overlay');
  const panelEl   = document.getElementById('panel');
  const toastsEl  = document.getElementById('toasts');
  const hudLevel  = document.getElementById('hud-level');
  const hudHp     = document.getElementById('hud-hp');
  const hudHpBar  = document.getElementById('hud-hp-bar');
  const hudWeap   = document.getElementById('hud-weapons');
  const hudCoins  = document.getElementById('hud-coins');
  const hudMoves  = document.getElementById('hud-moves');

  // ─── Resize ──────────────────────────────────────────────────────────────────
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (overlayEl.classList.contains('hidden') && state.board.length) {
        applyGridSize();
      }
    }, 120);
  });

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function toast(msg, kind) {
    const el = document.createElement('div');
    el.className = 'toast ' + (kind || '');
    el.textContent = msg;
    toastsEl.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  function updateHud() {
    hudLevel.textContent  = state.level;
    hudHp.textContent     = state.hp + '/' + state.maxHp;
    hudHpBar.style.width  = Math.max(0, (state.hp / state.maxHp) * 100) + '%';
    hudWeap.textContent   = state.weapons;
    hudCoins.textContent  = state.coins;
    hudMoves.textContent  = state.totalMoves;
  }

  // ─── High Scores ─────────────────────────────────────────────────────────────
  function loadScores() {
    try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; }
    catch (e) { return []; }
  }

  function saveScore(levels, moves) {
    const list = loadScores();
    list.push({ levels, moves, date: new Date().toLocaleDateString() });
    list.sort((a, b) => b.levels - a.levels || a.moves - b.moves);
    list.splice(10);
    localStorage.setItem(HS_KEY, JSON.stringify(list));
    return list;
  }

  function getBest() { return loadScores()[0] || null; }

  // ─── Level composition ───────────────────────────────────────────────────────
  function buildPairs(level) {
    // Fixed 8 pairs for the 4×4 grid; composition scales with depth
    const jokerPairs  = 1;
    const enemyPairs  = Math.min(3, Math.max(1, Math.floor(level * 0.6)));
    const weaponPairs = Math.min(2, Math.max(1, Math.ceil(level * 0.4)));
    const heartPairs  = 1;
    const coinPairs   = 1;
    let   pipPairs    = PAIRS - jokerPairs - enemyPairs - weaponPairs - heartPairs - coinPairs;
    if (pipPairs < 0) pipPairs = 0;

    const pairs = [];
    let id = 0;

    pairs.push({ kind: 'joker', matchId: 'J' + id++ });
    for (let i = 0; i < enemyPairs; i++)
      pairs.push({ kind: 'enemy', matchId: 'E' + id++, power: Math.max(1, level), typeIndex: i });
    for (let i = 0; i < weaponPairs; i++)
      pairs.push({ kind: 'weapon', matchId: 'W' + id++, typeIndex: i });
    for (let i = 0; i < heartPairs; i++)
      pairs.push({ kind: 'heart', matchId: 'H' + id++ });
    for (let i = 0; i < coinPairs; i++)
      pairs.push({ kind: 'coin', matchId: 'C' + id++ });

    // Fill remaining slots with playing-card pip pairs (rank-only — no suits to avoid
    // confusion where two same-rank different-suit cards look like a match but aren't)
    const pipPool = [...RANKS];
    shuffle(pipPool);
    for (let i = 0; i < pipPairs; i++) {
      pairs.push({ kind: 'pip', matchId: 'P' + id++, rank: pipPool[i] });
    }

    return pairs;
  }

  // ─── Build board ─────────────────────────────────────────────────────────────
  function buildBoard(level) {
    const pairs = buildPairs(level);
    const cards = [];
    for (const p of pairs) {
      cards.push({ ...p });
      cards.push({ ...p });
    }
    shuffle(cards);

    state.board        = cards;
    state.matched      = new Array(cards.length).fill(false);
    state.seenCount    = new Array(cards.length).fill(0);
    state.flipped      = [];
    state.matchedCount = 0;
    state.busy         = false;
    state.dealing      = true;

    renderBoard(true);
    updateHud();
  }

  // ─── Card size calculation ────────────────────────────────────────────────────
  function calcCardSize() {
    const gap  = 6;
    const wrap = document.getElementById('board-wrap');
    const r    = wrap.getBoundingClientRect();
    // Apply scale so cards occupy 2/3 of available space, leaving padding
    const availW = Math.floor(r.width  * CARD_SCALE);
    const availH = Math.floor(r.height * CARD_SCALE);
    const maxW   = (availW - (COLS - 1) * gap) / COLS;
    const maxH   = (availH - (ROWS - 1) * gap) / ROWS;
    // portrait aspect 2:3
    let cardW, cardH;
    if (maxW * 1.5 <= maxH) {
      cardW = Math.floor(maxW);
      cardH = Math.floor(cardW * 1.5);
    } else {
      cardH = Math.floor(maxH);
      cardW = Math.floor(cardH / 1.5);
    }
    return { cardW, cardH };
  }

  function applyGridSize() {
    const gap = 6;
    const { cardW, cardH } = calcCardSize();
    boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${cardW}px)`;
    boardEl.style.gridTemplateRows    = `repeat(${ROWS}, ${cardH}px)`;
    boardEl.style.gap = gap + 'px';
  }

  // ─── Render board ─────────────────────────────────────────────────────────────
  function renderBoard(animate) {
    boardEl.innerHTML = '';
    applyGridSize();

    state.board.forEach((card, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.index = i;

      if (state.matched[i]) {
        el.classList.add('matched', 'flipped');
      } else if (state.flipped.includes(i)) {
        el.classList.add('flipped');
      }

      if (animate) {
        el.classList.add('dealing');
        el.style.animationDelay = (i * 55) + 'ms';
      }

      el.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front ${frontClass(card)}">${frontInner(card)}</div>
        </div>`;

      const onTap = (ev) => { ev.preventDefault(); onCardTap(i); };
      el.addEventListener('click', onTap);
      el.addEventListener('touchstart', onTap, { passive: false });
      boardEl.appendChild(el);
    });

    if (animate) {
      // Disable input until last card lands, then strip the dealing class so
      // the dealIn animation can never restart (e.g. when shaking is toggled)
      const done = state.board.length * 55 + 450;
      setTimeout(() => {
        state.dealing = false;
        Array.from(boardEl.children).forEach(el => el.classList.remove('dealing'));
      }, done);
    }
  }

  function frontClass(card) {
    if (card.kind === 'pip') return RANK_COLOR[card.rank] || 'black';
    return 'special ' + card.kind;
  }

  function frontInner(card) {
    if (card.kind === 'pip') {
      const r = card.rank;
      const center = RANK_CENTER[r] || r;
      return `
        <div class="pip-tl"><span class="pip-rank">${r}</span></div>
        <div class="pip-center">${center}</div>
        <div class="pip-br"><span class="pip-rank">${r}</span></div>`;
    }
    if (card.kind === 'coin')   return `<div class="special-icon">🪙</div><div class="special-label">Coin</div>`;
    if (card.kind === 'heart')  return `<div class="special-icon">🧪</div><div class="special-label">Potion</div>`;
    if (card.kind === 'joker')  return `<div class="special-icon">🃏</div><div class="special-label">Joker</div>`;
    if (card.kind === 'weapon') {
      const w = WEAPON_DATA[card.typeIndex % WEAPON_DATA.length];
      return `<div class="special-icon">${w.icon}</div><div class="special-label">${w.name}</div>`;
    }
    if (card.kind === 'enemy') {
      const e = ENEMY_DATA[card.typeIndex % ENEMY_DATA.length];
      return `<div class="special-icon">${e.icon}</div><div class="special-label">${e.name}</div>`;
    }
    return '';
  }

  // ─── Card tap ────────────────────────────────────────────────────────────────
  function onCardTap(i) {
    if (state.busy || state.dealing) return;
    const cardEl = boardEl.children[i];
    if (!cardEl) return;
    if (state.matched[i] || state.flipped.includes(i)) return;

    cardEl.classList.add('flipped');
    state.seenCount[i]++;          // track this exposure
    state.flipped.push(i);

    if (state.flipped.length === 2) {
      state.busy = true;
      state.totalMoves++;
      updateHud();

      const [a, b]    = state.flipped;
      const cardA     = state.board[a];
      const cardB     = state.board[b];
      const isMatch   = cardA.matchId === cardB.matchId;

      if (isMatch) {
        setTimeout(() => {
          const elA = boardEl.children[a];
          const elB = boardEl.children[b];
          if (elA) elA.classList.add('matched');
          if (elB) elB.classList.add('matched');
          state.matched[a] = true;
          state.matched[b] = true;
          resolveMatch(cardA);
          state.matchedCount++;
          state.flipped = [];
          state.busy    = false;
          if (state.matchedCount >= PAIRS) {
            setTimeout(onLevelComplete, 600);
          }
        }, 450);

      } else {
        // ── No match: penalty for cards seen before (memory tax) ─────────────
        // seenCount was already incremented on tap, so >1 means previously seen
        const aPrev = state.seenCount[a] > 1;
        const bPrev = state.seenCount[b] > 1;
        const aDmg  = aPrev ? (cardA.kind === 'enemy' ? 3 : 1) : 0;
        const bDmg  = bPrev ? (cardB.kind === 'enemy' ? 3 : 1) : 0;
        const totalDmg = aDmg + bDmg;

        if (totalDmg > 0) {
          state.hp = Math.max(0, state.hp - totalDmg);
          if (aPrev) shakeCard(a);
          if (bPrev) shakeCard(b);
          shakeHp();
          let msg;
          const hasEnemy = (aPrev && cardA.kind === 'enemy') || (bPrev && cardB.kind === 'enemy');
          if (hasEnemy && totalDmg >= 6)  msg = '👹👹 Double enemy recall! −' + totalDmg + ' HP';
          else if (hasEnemy)              msg = '👹 You knew that enemy! −' + totalDmg + ' HP';
          else if (totalDmg >= 2)         msg = '🧠 Both seen before! −' + totalDmg + ' HP';
          else                            msg = '🧠 You\'ve seen that card! −1 HP';
          toast(msg, 'bad');
          updateHud();
        }

        // ── Check if game over ────────────────────────────────────────────────
        if (state.hp <= 0) {
          setTimeout(() => {
            flipBackBoth(a, b);
            onGameOver();
          }, 850);
          return;
        }

        // ── Joker check ───────────────────────────────────────────────────────
        const jokerIdx = cardA.kind === 'joker' ? a : (cardB.kind === 'joker' ? b : -1);

        setTimeout(() => {
          flipBackBoth(a, b);
          if (jokerIdx !== -1) {
            triggerJoker(jokerIdx);
          } else {
            state.busy = false;
          }
        }, 850);
      }
    }
  }

  function flipBackBoth(a, b) {
    const elA = boardEl.children[a];
    const elB = boardEl.children[b];
    if (elA) elA.classList.remove('flipped');
    if (elB) elB.classList.remove('flipped');
    state.flipped = [];
  }

  function shakeCard(i) {
    const el = boardEl.children[i];
    if (!el) return;
    el.classList.remove('shaking');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('shaking');
    setTimeout(() => el.classList.remove('shaking'), 500);
  }

  function shakeHp() {
    const el = document.getElementById('hud-hp').closest('.stat');
    if (!el) return;
    el.classList.remove('shaking');
    void el.offsetWidth;
    el.classList.add('shaking');
    setTimeout(() => el.classList.remove('shaking'), 400);
  }

  // ─── Joker effect ────────────────────────────────────────────────────────────
  function triggerJoker(jokerIdx) {
    // Find random face-down unmatched card (not the joker itself)
    const targets = [];
    state.board.forEach((_, i) => {
      if (i !== jokerIdx && !state.matched[i]) targets.push(i);
    });

    const jokerEl = boardEl.children[jokerIdx];
    if (jokerEl) jokerEl.classList.add('joker-acting');
    toast('🃏 Joker reshuffles the dungeon!', 'orange');

    if (targets.length === 0) {
      setTimeout(() => {
        if (jokerEl) jokerEl.classList.remove('joker-acting');
        state.busy = false;
      }, 580);
      return;
    }

    const targetIdx = targets[Math.floor(Math.random() * targets.length)];

    setTimeout(() => {
      // Remove joker-acting so it never overrides matchPop if this joker is later matched
      if (jokerEl) jokerEl.classList.remove('joker-acting');

      // Swap in state arrays
      [state.board[jokerIdx], state.board[targetIdx]] = [state.board[targetIdx], state.board[jokerIdx]];
      [state.matched[jokerIdx], state.matched[targetIdx]] = [state.matched[targetIdx], state.matched[jokerIdx]];

      // Swap front-face HTML+class in DOM (backs stay the same; player can't see fronts)
      const elJ = boardEl.children[jokerIdx];
      const elT = boardEl.children[targetIdx];
      if (elJ && elT) {
        const fJ = elJ.querySelector('.card-front');
        const fT = elT.querySelector('.card-front');
        if (fJ && fT) {
          const tmpClass = fJ.className, tmpHTML = fJ.innerHTML;
          fJ.className = fT.className; fJ.innerHTML = fT.innerHTML;
          fT.className = tmpClass;     fT.innerHTML = tmpHTML;
        }
      }
      state.busy = false;
    }, 580);
  }

  // ─── Match effects ───────────────────────────────────────────────────────────
  function resolveMatch(card) {
    switch (card.kind) {
      case 'pip': {
        const g = 10 * state.level;
        state.coins += g;
        toast('+' + g + ' 🪙 lucky pair', 'gold');
        break;
      }
      case 'coin': {
        const g = 25 * state.level;
        state.coins += g;
        toast('+' + g + ' 🪙 treasure!', 'gold');
        break;
      }
      case 'weapon': {
        const w = WEAPON_DATA[card.typeIndex % WEAPON_DATA.length];
        state.weapons++;
        toast('+1 ' + w.icon + ' ' + w.name + ' found', 'purple');
        break;
      }
      case 'heart': {
        const heal = Math.min(3, state.maxHp - state.hp);
        state.hp = Math.min(state.maxHp, state.hp + 3);
        toast(heal > 0 ? '+' + heal + ' ❤️ potion quaffed' : '🧪 already full HP', 'good');
        break;
      }
      case 'enemy': {
        const e = ENEMY_DATA[card.typeIndex % ENEMY_DATA.length];
        if (state.weapons > 0) {
          state.weapons--;
          const r = 15 * state.level;
          state.coins += r;
          toast(e.icon + ' ' + e.name + ' slain! +' + r + ' 🪙', 'good');
        } else {
          state.hp = Math.max(0, state.hp - card.power);
          toast('💥 ' + e.name + ' ambush! −' + card.power + ' HP', 'bad');
          if (state.hp <= 0) {
            updateHud();
            setTimeout(onGameOver, 700);
            return;
          }
        }
        break;
      }
      case 'joker': {
        const g = 20 * state.level;
        state.coins += g;
        toast('🃏 Joker tamed! +' + g + ' 🪙', 'gold');
        break;
      }
    }
    updateHud();
  }

  // ─── Level flow ──────────────────────────────────────────────────────────────
  function onLevelComplete() {
    const bonus = 20 + state.level * 10;
    const heal  = Math.min(2, state.maxHp - state.hp);
    state.coins += bonus;
    state.hp     = Math.min(state.maxHp, state.hp + heal);
    updateHud();

    overlayEl.classList.remove('hidden');
    panelEl.innerHTML = `
      <h1>🏰 Dungeon ${state.level} Cleared!</h1>
      <h2>You descend deeper…</h2>
      <div class="stats-line">
        <div>❤️ <span>${state.hp}/${state.maxHp}</span></div>
        <div>🗡️ <span>${state.weapons}</span></div>
        <div>🪙 <span>${state.coins}</span></div>
        <div>👣 <span>${state.totalMoves} moves</span></div>
      </div>
      <p>Level bonus: <b>+${bonus} 🪙</b>${heal > 0 ? ` and <b>+${heal} ❤️</b> recovered` : ''}.</p>
      <div class="btn-row">
        <button id="next-btn">Enter Dungeon ${state.level + 1}</button>
      </div>`;
    document.getElementById('next-btn').addEventListener('click', () => {
      state.level++;
      overlayEl.classList.add('hidden');
      buildBoard(state.level);
    });
  }

  function onGameOver() {
    const cleared = Math.max(0, state.level - 1);
    saveScore(cleared, state.totalMoves);
    const best = getBest();

    overlayEl.classList.remove('hidden');
    panelEl.innerHTML = `
      <h1>💀 You Fell</h1>
      <h2>The dungeon claimed you on Level ${state.level}</h2>
      <div class="stats-line">
        <div>Dungeons Cleared: <span>${cleared}</span></div>
        <div>Total Moves: <span>${state.totalMoves}</span></div>
        <div>🪙 <span>${state.coins}</span></div>
      </div>
      ${best ? `<p>🏆 Best run: <b>${best.levels}</b> dungeons in <b>${best.moves}</b> moves.</p>` : ''}
      <p>Remember which cards hid the weapons and try again.</p>
      <div class="btn-row">
        <button id="retry-btn">New Run</button>
        <button id="hs-btn" class="secondary">High Scores</button>
      </div>`;
    document.getElementById('retry-btn').addEventListener('click', startRun);
    document.getElementById('hs-btn').addEventListener('click', () => showHighScores(false));
  }

  // ─── Screens ─────────────────────────────────────────────────────────────────
  function showHighScores(fromMenu) {
    const list = loadScores();
    let rows = list.length === 0
      ? `<tr><td colspan="4" style="text-align:center;color:#8a8aa8;padding:16px 0">
           No scores yet — start playing!
         </td></tr>`
      : list.map((s, idx) => `
          <tr>
            <td class="rank">${idx === 0 ? '🥇' : idx + 1}</td>
            <td class="lvls">${s.levels}</td>
            <td class="mvs">${s.moves}</td>
            <td class="dt">${s.date}</td>
          </tr>`).join('');

    overlayEl.classList.remove('hidden');
    panelEl.innerHTML = `
      <h1>🏆 High Scores</h1>
      <h2>Top 10 Runs</h2>
      <table class="score-table">
        <thead><tr>
          <th class="rank">#</th>
          <th>Dungeons</th>
          <th>Moves</th>
          <th style="text-align:right">Date</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="font-size:12px;color:#8a8aa8;margin-bottom:12px">
        Best score = most dungeons cleared with fewest moves.
      </p>
      <div class="btn-row">
        <button id="hs-back-btn" class="secondary">Back</button>
      </div>`;
    document.getElementById('hs-back-btn').addEventListener('click', () => {
      showMainMenu();
    });
  }

  function showMainMenu() {
    const best = getBest();
    overlayEl.classList.remove('hidden');
    panelEl.innerHTML = `
      <h1>⚔️ Memory Dungeon</h1>
      <h2>The Card Crawl</h2>
      ${best ? `<div class="best-banner">
        🏆 Best Run: <span class="bv">${best.levels}</span> dungeon${best.levels !== 1 ? 's' : ''}
        in <span class="bv">${best.moves}</span> moves
      </div>` : ''}
      <ul>
        <li>🔲 Flip two cards to find matching pairs</li>
        <li>🧠 Flip a card you've already seen without matching it → <b>−1 HP</b></li>
        <li>👹 Doing the same with an enemy card → <b>−3 HP</b></li>
        <li>🃏 <b>Joker flipped without a match</b> secretly moves a card</li>
        <li>🗡️ <b>Weapon pairs</b> arm you vs. matched enemies</li>
        <li>❤️ <b>Potion pairs</b> restore health</li>
        <li>🪙 Clear all pairs to descend to the next dungeon</li>
      </ul>
      <div class="btn-row">
        <button id="start-btn">Begin the Descent</button>
        <button id="scores-btn" class="secondary">High Scores</button>
      </div>`;
    document.getElementById('start-btn').addEventListener('click', startRun);
    document.getElementById('scores-btn').addEventListener('click', () => showHighScores(true));
  }

  function startRun() {
    state.level        = 1;
    state.hp           = MAX_HP;
    state.maxHp        = MAX_HP;
    state.weapons      = 0;
    state.coins        = 0;
    state.totalMoves   = 0;
    overlayEl.classList.add('hidden');
    buildBoard(state.level);
  }

  // ─── Boot ────────────────────────────────────────────────────────────────────
  updateHud();
  showMainMenu();

})();
</script>
<script src="../header.js"></script>
</body>
</html>
