<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LiDAR Metroid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#000}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.info{padding:6px 8px;font-size:11px;color:#aaa;text-align:center}
.c{display:flex;gap:4px;padding:6px}.btn{flex:1;padding:12px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:12px}
.btn:active{background:#7c3aed}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="480"></canvas>
<div id="hud"><span>Pings: <b id="pg">30</b></span><span>Key: <b id="kk">0</b></span></div>
<div class="info">Tap/click to ping (LiDAR). Dots reveal walls. Find the key 🔑 then exit.</div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bU">▲</button>
<button class="btn" id="bD">▼</button>
<button class="btn" id="bR">▶</button>
</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
let p,walls,dots,key,exit,pings,hasKey,running=true,keys={};
function reset(){
  p={x:30,y:30,r:8,spd:2};
  walls=[];
  // maze-like walls
  const GS=60;
  for(let i=0;i<W;i+=GS)for(let j=0;j<H;j+=GS){
    if(Math.random()<.3&&!(i<80&&j<80)&&!(i>W-100&&j>H-100))walls.push({x:i,y:j,w:40,h:40});
  }
  // border
  walls.push({x:0,y:0,w:W,h:10},{x:0,y:H-10,w:W,h:10},{x:0,y:0,w:10,h:H},{x:W-10,y:0,w:10,h:H});
  key={x:W/2,y:H/2};
  exit={x:W-40,y:H-40};
  dots=[];pings=30;hasKey=false;
}
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR','bU','bD'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
c.addEventListener('pointerdown',e=>{
  if(pings<=0)return;
  pings--;
  // cast rays
  for(let a=0;a<Math.PI*2;a+=Math.PI/60){
    let x=p.x,y=p.y,dx=Math.cos(a),dy=Math.sin(a);
    for(let d=0;d<400;d+=2){
      x+=dx*2;y+=dy*2;
      if(walls.some(w=>x>w.x&&x<w.x+w.w&&y>w.y&&y<w.y+w.h)){dots.push({x,y,life:500});break;}
    }
  }
});
function rectVs(a,b){return a.x-a.r<b.x+b.w&&a.x+a.r>b.x&&a.y-a.r<b.y+b.h&&a.y+a.r>b.y;}
function loop(){
  if(running){
    let dx=0,dy=0;
    if(keys['a']||keys['arrowleft']||keys['bL'])dx=-1;
    if(keys['d']||keys['arrowright']||keys['bR'])dx=1;
    if(keys['w']||keys['arrowup']||keys['bU'])dy=-1;
    if(keys['s']||keys['arrowdown']||keys['bD'])dy=1;
    const m=Math.hypot(dx,dy)||1;
    const nx=p.x+dx/m*p.spd,ny=p.y+dy/m*p.spd;
    if(!walls.some(w=>nx+p.r>w.x&&nx-p.r<w.x+w.w&&p.y+p.r>w.y&&p.y-p.r<w.y+w.h))p.x=nx;
    if(!walls.some(w=>p.x+p.r>w.x&&p.x-p.r<w.x+w.w&&ny+p.r>w.y&&ny-p.r<w.y+w.h))p.y=ny;
    if(!hasKey&&Math.hypot(p.x-key.x,p.y-key.y)<16){hasKey=true;pings+=10;}
    if(hasKey&&Math.hypot(p.x-exit.x,p.y-exit.y)<20){running=false;}
    dots.forEach(d=>d.life--);dots=dots.filter(d=>d.life>0);
    document.getElementById('pg').textContent=pings;
    document.getElementById('kk').textContent=hasKey?'YES':'NO';
  }
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  dots.forEach(d=>{ctx.fillStyle='rgba(34,211,238,'+Math.min(1,d.life/200)+')';ctx.fillRect(d.x-1,d.y-1,2,2);});
  // player
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();
  // key (only visible near)
  if(!hasKey&&Math.hypot(p.x-key.x,p.y-key.y)<80){ctx.fillStyle='#fbbf24';ctx.font='16px monospace';ctx.fillText('🔑',key.x-8,key.y+6);}
  if(hasKey){ctx.fillStyle='#22c55e';ctx.fillRect(exit.x-10,exit.y-10,20,20);}
  if(!running){ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#22c55e';ctx.font='24px monospace';ctx.fillText('Escaped!',W/2-50,H/2);}
  requestAnimationFrame(loop);
}
reset();loop();
})();
</script><script src="../notes.js"></script></body></html>
