<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Juicy Hardest Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a15;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#000}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.c{display:flex;gap:4px;padding:6px}.btn{flex:1;padding:14px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:14px}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="440"></canvas>
<div id="hud"><span>Coins: <b id="co">0</b>/3</span><span>Deaths: <b id="dd">0</b></span></div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bU">▲</button>
<button class="btn" id="bD">▼</button>
<button class="btn" id="bR">▶</button>
</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const keys={};let p={x:30,y:H/2,r:10};let coins=[{x:240,y:100,got:false},{x:240,y:340,got:false},{x:420,y:220,got:false}];
let balls=[],deaths=0,got=0,shake=0,particles=[],beat=0;
const zone={x:0,y:140,w:180,h:160},end={x:W-60,y:180,w:60,h:80};
function reset(){p.x=30;p.y=H/2;coins.forEach(c=>c.got=false);got=0;balls=[{x:200,y:180,vx:4,vy:0},{x:300,y:260,vx:-3,vy:0},{x:250,y:300,vx:3.5,vy:0},{x:400,y:160,vx:-4,vy:0}];}
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR','bU','bD'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
function loop(){
  let dx=0,dy=0;
  if(keys['a']||keys['arrowleft']||keys['bL'])dx=-1;
  if(keys['d']||keys['arrowright']||keys['bR'])dx=1;
  if(keys['w']||keys['arrowup']||keys['bU'])dy=-1;
  if(keys['s']||keys['arrowdown']||keys['bD'])dy=1;
  const m=Math.hypot(dx,dy)||1;p.x+=dx/m*3;p.y+=dy/m*3;
  p.x=Math.max(p.r,Math.min(W-p.r,p.x));p.y=Math.max(p.r,Math.min(H-p.r,p.y));
  balls.forEach(b=>{b.x+=b.vx;if(b.x<180||b.x>420)b.vx*=-1;});
  balls.forEach(b=>{if(Math.hypot(b.x-p.x,b.y-p.y)<14){deaths++;shake=20;for(let i=0;i<30;i++)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:30,col:'#ef4444'});reset();}});
  coins.forEach(co=>{if(!co.got&&Math.hypot(co.x-p.x,co.y-p.y)<16){co.got=true;got++;for(let i=0;i<20;i++)particles.push({x:co.x,y:co.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:40,col:'#fbbf24'});}});
  if(p.x>end.x&&got>=3){for(let i=0;i<60;i++)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,life:60,col:'#22c55e'});setTimeout(()=>{alert('Win! Deaths: '+deaths);deaths=0;reset();},100);}
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life--;});particles=particles.filter(p=>p.life>0);
  if(shake>0)shake--;
  beat+=.05;
  ctx.save();
  const sx=shake?(Math.random()-.5)*shake:0,sy=shake?(Math.random()-.5)*shake:0;
  ctx.translate(sx,sy);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(167,139,250,'+(.1+Math.sin(beat)*.05)+')';ctx.fillRect(zone.x,zone.y,zone.w,zone.h);
  ctx.strokeStyle='#7c3aed';ctx.lineWidth=2;ctx.strokeRect(zone.x,zone.y,zone.w,zone.h);
  ctx.fillStyle='#22c55e';ctx.fillRect(end.x,end.y,end.w,end.h);
  coins.forEach(co=>{if(co.got)return;ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(co.x,co.y,8,0,6.28);ctx.fill();ctx.strokeStyle='#fff';ctx.stroke();});
  balls.forEach(b=>{
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(b.x,b.y,8+Math.sin(beat)*2,0,6.28);ctx.fill();
    ctx.strokeStyle='rgba(59,130,246,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(b.x,b.y,15,0,6.28);ctx.stroke();
  });
  particles.forEach(p=>{ctx.fillStyle=p.col;ctx.globalAlpha=p.life/40;ctx.fillRect(p.x-2,p.y-2,4,4);ctx.globalAlpha=1;});
  ctx.fillStyle='#ef4444';ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
  ctx.restore();
  document.getElementById('co').textContent=got;document.getElementById('dd').textContent=deaths;
  requestAnimationFrame(loop);
}
reset();loop();
})();
</script><script src="../notes.js"></script></body></html>
