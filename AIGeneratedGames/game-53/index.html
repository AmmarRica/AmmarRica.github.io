<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Times Table Trainer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #0f0f1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
    min-height: 100%;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    padding: 10px;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* HUD */
  #hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    background: linear-gradient(180deg, #1a1a2e, #141428);
    border: 1px solid #3b3b5c;
    border-radius: 12px;
    padding: 8px;
  }
  .stat {
    background: #0f0f1a;
    border-radius: 8px;
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
    border: 1px solid #2a2a44;
  }
  .stat .label {
    color: #8a8aa8;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .stat .val { font-weight: 700; font-size: 18px; line-height: 1; }
  .stat.score .val { color: #fbbf24; }
  .stat.streak .val { color: #22c55e; }
  .stat.level .val { color: #a78bfa; }
  .stat.time .val { color: #38bdf8; font-variant-numeric: tabular-nums; }

  /* Mastery controls */
  .mastery-bar {
    display: none;
    gap: 6px;
    align-items: center;
    justify-content: space-between;
    background: #141428;
    border: 1px solid #3b3b5c;
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    color: #c0c0e0;
  }
  .mastery-bar.show { display: flex; }
  .mastery-bar .progress-wrap {
    flex: 1;
    height: 8px;
    background: #0f0f1a;
    border-radius: 4px;
    overflow: hidden;
    margin: 0 10px;
    border: 1px solid #2a2a44;
  }
  .mastery-bar .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #22c55e);
    width: 0%;
    transition: width 0.2s;
  }
  .mastery-bar button {
    background: #2a2a44;
    color: #a78bfa;
    border: 1px solid #3b3b5c;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  /* Mode selection */
  .mode-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-btn {
    background: #1e1e2e;
    color: #a78bfa;
    border: 1px solid #3b3b5c;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .mode-btn.active {
    background: #a78bfa;
    color: #0f0f1a;
    border-color: #a78bfa;
    font-weight: 700;
  }

  /* Problem display */
  .problem-box {
    background: linear-gradient(180deg, #1a1a2e, #141428);
    border: 1px solid #3b3b5c;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .problem {
    font-size: 36px;
    font-weight: 800;
    color: #e0e0ff;
    letter-spacing: 2px;
    margin-bottom: 10px;
    min-height: 44px;
  }
  .problem .op { color: #a78bfa; margin: 0 8px; }
  .problem .eq { color: #8a8aa8; margin: 0 8px; }
  .problem .ans {
    display: inline-block;
    min-width: 60px;
    padding: 2px 10px;
    border-bottom: 3px solid #fbbf24;
    color: #fbbf24;
  }

  /* Visual grid */
  .visual {
    display: grid;
    gap: 3px;
    margin: 10px auto;
    justify-content: center;
    max-width: 100%;
    overflow: hidden;
  }
  .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #c4b5fd, #7c3aed);
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .dot.row-a { background: radial-gradient(circle at 30% 30%, #fde68a, #f59e0b); }
  .dot.row-b { background: radial-gradient(circle at 30% 30%, #bbf7d0, #16a34a); }
  .dot.row-c { background: radial-gradient(circle at 30% 30%, #bfdbfe, #2563eb); }
  .dot.row-d { background: radial-gradient(circle at 30% 30%, #fecaca, #dc2626); }
  .visual.small .dot { width: 14px; height: 14px; }
  .visual.tiny .dot { width: 10px; height: 10px; }

  .hint {
    color: #8a8aa8;
    font-size: 12px;
    margin-top: 6px;
    min-height: 16px;
  }
  .hint.correct { color: #22c55e; }
  .hint.wrong { color: #ef4444; }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .key {
    background: #1e1e2e;
    color: #e0e0ff;
    border: 1px solid #3b3b5c;
    border-radius: 10px;
    padding: 16px 0;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.05s, background 0.1s;
  }
  .key:active { transform: scale(0.95); background: #2a2a3e; }
  .key.action { background: #2a2a44; color: #a78bfa; font-size: 16px; }
  .key.submit { background: #7c3aed; color: #fff; border-color: #7c3aed; }
  .key.submit:disabled { opacity: 0.35; cursor: not-allowed; }

  .table-select {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    background: #141428;
    border: 1px solid #3b3b5c;
    border-radius: 10px;
    padding: 8px;
  }
  .table-btn {
    background: #1e1e2e;
    color: #c0c0e0;
    border: 1px solid #3b3b5c;
    border-radius: 6px;
    padding: 8px 0;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .table-btn.active {
    background: #a78bfa;
    color: #0f0f1a;
    border-color: #a78bfa;
  }

  .section-title {
    color: #8a8aa8;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    text-align: center;
  }

  .feedback-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    z-index: 10;
    padding: 20px;
  }
  .feedback-overlay.show { display: flex; }
  .feedback-card {
    background: #1a1a2e;
    border: 2px solid #a78bfa;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    max-width: 320px;
    width: 100%;
  }
  .feedback-card h2 {
    font-size: 22px;
    margin-bottom: 8px;
  }
  .feedback-card.good h2 { color: #22c55e; }
  .feedback-card.bad h2 { color: #ef4444; }
  .feedback-card p {
    color: #c0c0e0;
    margin-bottom: 14px;
    font-size: 14px;
    line-height: 1.5;
  }
  .feedback-card .big-eq {
    font-size: 20px;
    color: #fbbf24;
    font-weight: 700;
    margin: 8px 0;
  }
  .feedback-card button {
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .feedback-card { animation: pop 0.25s ease-out; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat score"><div class="label">Score</div><div class="val" id="score">0</div></div>
    <div class="stat streak"><div class="label">Streak</div><div class="val" id="streak">0</div></div>
    <div class="stat level"><div class="label" id="solvedLabel">Solved</div><div class="val" id="solved">0</div></div>
    <div class="stat time"><div class="label">Time</div><div class="val" id="timer">0:00</div></div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="learn">Learn</button>
    <button class="mode-btn" data-mode="practice">Practice</button>
    <button class="mode-btn" data-mode="mastery">Mastery</button>
  </div>

  <div class="mastery-bar" id="masteryBar">
    <span id="masteryLeft">0 left</span>
    <div class="progress-wrap"><div class="progress-fill" id="masteryFill"></div></div>
    <button id="masteryRestart">Restart</button>
  </div>

  <div>
    <div class="section-title">Focus Table</div>
    <div class="table-select" id="tableSelect"></div>
  </div>

  <div class="problem-box">
    <div class="problem" id="problem"></div>
    <div class="visual" id="visual"></div>
    <div class="hint" id="hint">Tap numbers, then ✓ to check.</div>
  </div>

  <div class="keypad">
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key action" data-k="clear">Clr</button>
    <button class="key" data-k="0">0</button>
    <button class="key submit" data-k="ok">✓</button>
  </div>
</div>

<div class="feedback-overlay" id="overlay">
  <div class="feedback-card" id="card">
    <h2 id="cardTitle"></h2>
    <div class="big-eq" id="cardEq"></div>
    <p id="cardMsg"></p>
    <button id="cardBtn">Next</button>
  </div>
</div>

<script>
(function () {
  var STORAGE_KEY = 'ttt_failed_v1';
  var CORRECTS_TO_CLEAR = 3; // after a failure, must get it right this many times

  function loadFailed() {
    try {
      var v = JSON.parse(localStorage.getItem(STORAGE_KEY));
      return (v && typeof v === 'object') ? v : {};
    } catch (e) { return {}; }
  }
  function saveFailed() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.failed)); } catch (e) {}
  }
  function keyOf(a, b) {
    return Math.min(a, b) + 'x' + Math.max(a, b);
  }
  function parseKey(k) {
    var p = k.split('x');
    return [parseInt(p[0], 10), parseInt(p[1], 10)];
  }

  var state = {
    mode: 'learn',
    focus: 'all',
    score: 0,
    streak: 0,
    solved: 0,
    a: 0,
    b: 0,
    answer: '',
    lastKey: null,
    failed: loadFailed(),
    // Mastery:
    mastery: null,       // { queue: {key: remaining}, total, passed, errors, startedAt, elapsedMs, running }
    timerId: null
  };

  var els = {
    score: document.getElementById('score'),
    streak: document.getElementById('streak'),
    solved: document.getElementById('solved'),
    solvedLabel: document.getElementById('solvedLabel'),
    timer: document.getElementById('timer'),
    problem: document.getElementById('problem'),
    visual: document.getElementById('visual'),
    hint: document.getElementById('hint'),
    tableSelect: document.getElementById('tableSelect'),
    overlay: document.getElementById('overlay'),
    card: document.getElementById('card'),
    cardTitle: document.getElementById('cardTitle'),
    cardEq: document.getElementById('cardEq'),
    cardMsg: document.getElementById('cardMsg'),
    cardBtn: document.getElementById('cardBtn'),
    masteryBar: document.getElementById('masteryBar'),
    masteryLeft: document.getElementById('masteryLeft'),
    masteryFill: document.getElementById('masteryFill'),
    masteryRestart: document.getElementById('masteryRestart')
  };

  // Build table selector: All + 1..9
  var tbl = els.tableSelect;
  var allBtn = document.createElement('button');
  allBtn.className = 'table-btn active';
  allBtn.textContent = 'All';
  allBtn.setAttribute('data-t', 'all');
  tbl.appendChild(allBtn);
  for (var i = 1; i <= 9; i++) {
    var b = document.createElement('button');
    b.className = 'table-btn';
    b.textContent = '×' + i;
    b.setAttribute('data-t', String(i));
    tbl.appendChild(b);
  }

  function rand(n) { return Math.floor(Math.random() * n); }
  function pick(arr) { return arr[rand(arr.length)]; }

  function matchesFocus(a, b) {
    if (state.focus === 'all') return true;
    var f = parseInt(state.focus, 10);
    return a === f || b === f;
  }

  // ---------- Timer ----------
  function fmtTime(ms) {
    var s = Math.floor(ms / 1000);
    var m = Math.floor(s / 60);
    s = s % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }
  function tickTimer() {
    if (state.mastery && state.mastery.running) {
      var now = Date.now();
      state.mastery.elapsedMs = now - state.mastery.startedAt;
      els.timer.textContent = fmtTime(state.mastery.elapsedMs);
    }
  }
  function startTimer() {
    stopTimer();
    state.timerId = setInterval(tickTimer, 250);
  }
  function stopTimer() {
    if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
  }

  // ---------- Mastery ----------
  function buildMasteryQueue() {
    var q = {};
    for (var a = 1; a <= 9; a++) {
      for (var b = a; b <= 9; b++) {
        if (matchesFocus(a, b)) {
          q[keyOf(a, b)] = 1; // each problem needs 1 correct to pass initially
        }
      }
    }
    return q;
  }
  function startMastery() {
    var queue = buildMasteryQueue();
    state.mastery = {
      queue: queue,
      total: Object.keys(queue).length,
      passed: 0,
      errors: 0,
      startedAt: Date.now(),
      elapsedMs: 0,
      running: true
    };
    els.timer.textContent = '0:00';
    startTimer();
    updateMasteryBar();
    newProblem();
  }
  function updateMasteryBar() {
    if (state.mode !== 'mastery' || !state.mastery) {
      els.masteryBar.classList.remove('show');
      return;
    }
    els.masteryBar.classList.add('show');
    var left = Object.keys(state.mastery.queue).length;
    els.masteryLeft.textContent = left + ' left';
    var pct = state.mastery.total > 0
      ? Math.max(0, Math.min(100, 100 * (state.mastery.total - left) / state.mastery.total))
      : 0;
    els.masteryFill.style.width = pct + '%';
  }
  function finishMastery() {
    state.mastery.running = false;
    stopTimer();
    var t = fmtTime(state.mastery.elapsedMs);
    var errs = state.mastery.errors;
    els.card.className = 'feedback-card good';
    els.cardTitle.textContent = '🏆 Mastered!';
    els.cardEq.textContent = 'Time: ' + t;
    els.cardMsg.textContent = errs === 0
      ? 'Flawless — every answer correct on the first try!'
      : 'Mistakes: ' + errs + '. Start again to beat your time.';
    els.cardBtn.textContent = 'Play again';
    els.overlay.classList.add('show');
  }

  // ---------- Problem picking ----------
  function candidatesFromFocus() {
    var list = [];
    for (var a = 1; a <= 9; a++) {
      for (var b = a; b <= 9; b++) {
        if (matchesFocus(a, b)) list.push(keyOf(a, b));
      }
    }
    return list;
  }

  function newProblem() {
    var key = null;

    if (state.mode === 'mastery') {
      if (!state.mastery || !state.mastery.running) { return; }
      var keys = Object.keys(state.mastery.queue);
      if (keys.length === 0) { finishMastery(); return; }
      var avail = keys.filter(function (k) { return k !== state.lastKey; });
      if (avail.length === 0) avail = keys;
      // Prefer keys with higher remaining count (harder ones) weighted lightly
      var weighted = [];
      avail.forEach(function (k) {
        var n = state.mastery.queue[k];
        for (var i = 0; i < n; i++) weighted.push(k);
      });
      key = pick(weighted.length ? weighted : avail);
    } else {
      // Learn / Practice: 40% bias toward failed set if any match the focus
      var focusCandidates = candidatesFromFocus();
      var failedInFocus = Object.keys(state.failed).filter(function (k) {
        var p = parseKey(k);
        return matchesFocus(p[0], p[1]);
      });
      var useFailed = failedInFocus.length > 0 && Math.random() < 0.4;
      var pool = useFailed ? failedInFocus : focusCandidates;
      var avail = pool.filter(function (k) { return k !== state.lastKey; });
      if (avail.length === 0) avail = pool;
      key = pick(avail);
    }

    var parts = parseKey(key);
    var a = parts[0], b = parts[1];
    // Randomize order so "3 x 7" and "7 x 3" both appear
    if (Math.random() < 0.5) { var t = a; a = b; b = t; }
    state.a = a;
    state.b = b;
    state.lastKey = key;
    state.answer = '';
    render();
  }

  // ---------- Render ----------
  function render() {
    var a = state.a, b = state.b;
    var ansText = state.answer === '' ? '?' : state.answer;
    els.problem.innerHTML =
      '<span class="num">' + a + '</span>' +
      '<span class="op">×</span>' +
      '<span class="num">' + b + '</span>' +
      '<span class="eq">=</span>' +
      '<span class="ans">' + ansText + '</span>';

    // Visual grid only in Learn mode
    els.visual.innerHTML = '';
    if (state.mode === 'learn') {
      var rows = a, cols = b;
      els.visual.style.gridTemplateColumns = 'repeat(' + cols + ', auto)';
      els.visual.className = 'visual' + (cols > 7 ? ' small' : '') + (cols > 8 && rows > 8 ? ' tiny' : '');
      for (var r = 0; r < rows; r++) {
        var cls = 'dot row-' + 'abcd'[r % 4];
        for (var c = 0; c < cols; c++) {
          var d = document.createElement('div');
          d.className = cls;
          els.visual.appendChild(d);
        }
      }
    }

    var k = keyOf(a, b);
    if (state.mode === 'learn') {
      els.hint.textContent = a + ' rows of ' + b + ' = ' + (a * b) + ' dots.';
      els.hint.className = 'hint';
    } else if (state.mode === 'mastery') {
      var needed = state.mastery && state.mastery.queue[k] ? state.mastery.queue[k] : 1;
      els.hint.textContent = needed > 1
        ? needed + ' more correct needed for this one.'
        : 'Type the product, then press ✓';
      els.hint.className = 'hint';
    } else {
      var owed = state.failed[k] || 0;
      els.hint.textContent = owed > 0
        ? 'Review: ' + owed + ' more correct to clear this one.'
        : 'Type the product, then press ✓';
      els.hint.className = 'hint';
    }
  }

  function updateHud() {
    els.score.textContent = state.score;
    els.streak.textContent = state.streak;
    if (state.mode === 'mastery' && state.mastery) {
      els.solvedLabel.textContent = 'Left';
      els.solved.textContent = Object.keys(state.mastery.queue).length;
    } else {
      els.solvedLabel.textContent = 'Solved';
      els.solved.textContent = state.solved;
    }
  }

  // ---------- Answer check ----------
  function check() {
    if (state.answer === '') return;
    // In Mastery, don't accept input after completion
    if (state.mode === 'mastery' && (!state.mastery || !state.mastery.running)) return;

    var guess = parseInt(state.answer, 10);
    var truth = state.a * state.b;
    var k = keyOf(state.a, state.b);

    if (guess === truth) {
      state.streak++;
      state.solved++;
      var pts = 10 + Math.min(state.streak, 10) * 2;
      state.score += pts;

      // Decrement the persistent "failed" counter
      if (state.failed[k]) {
        state.failed[k]--;
        if (state.failed[k] <= 0) delete state.failed[k];
        saveFailed();
      }

      // Mastery bookkeeping
      if (state.mode === 'mastery' && state.mastery) {
        if (state.mastery.queue[k] != null) {
          state.mastery.queue[k]--;
          if (state.mastery.queue[k] <= 0) {
            delete state.mastery.queue[k];
            state.mastery.passed++;
          }
        }
        updateMasteryBar();
      }

      updateHud();
      showFeedback(true, '+' + pts + ' points. Streak: ' + state.streak);
    } else {
      state.streak = 0;

      // Persistent: a failure makes this problem require CORRECTS_TO_CLEAR correct answers
      state.failed[k] = CORRECTS_TO_CLEAR;
      saveFailed();

      if (state.mode === 'mastery' && state.mastery) {
        state.mastery.errors++;
        // Problem must be answered correctly 3 times to clear it
        state.mastery.queue[k] = CORRECTS_TO_CLEAR;
        updateMasteryBar();
      }

      updateHud();
      showFeedback(false, 'The answer is ' + truth + '. You will see this one again.');
    }
  }

  function showFeedback(good, msg) {
    els.card.className = 'feedback-card ' + (good ? 'good' : 'bad');
    els.cardTitle.textContent = good ? 'Correct!' : 'Not quite';
    els.cardEq.textContent = state.a + ' × ' + state.b + ' = ' + (state.a * state.b);
    els.cardMsg.textContent = msg;
    els.cardBtn.textContent = 'Next';
    els.overlay.classList.add('show');
  }

  function dismissOverlay() {
    els.overlay.classList.remove('show');
    // If mastery finished, a click on "Play again" restarts
    if (state.mode === 'mastery' && state.mastery && !state.mastery.running) {
      startMastery();
    } else if (state.mode === 'mastery' && state.mastery && Object.keys(state.mastery.queue).length === 0) {
      finishMastery();
    } else {
      newProblem();
    }
  }

  els.cardBtn.addEventListener('click', dismissOverlay);

  // Keypad
  document.querySelectorAll('.key').forEach(function (k) {
    k.addEventListener('click', function () {
      var v = k.getAttribute('data-k');
      if (v === 'clear') {
        state.answer = '';
        render();
      } else if (v === 'ok') {
        check();
      } else {
        if (state.answer.length < 3) {
          state.answer += v;
          render();
        }
      }
    });
  });

  // Physical keyboard
  document.addEventListener('keydown', function (e) {
    if (e.key >= '0' && e.key <= '9') {
      if (state.answer.length < 3) {
        state.answer += e.key;
        render();
      }
    } else if (e.key === 'Enter') {
      if (els.overlay.classList.contains('show')) {
        dismissOverlay();
      } else {
        check();
      }
    } else if (e.key === 'Backspace') {
      state.answer = state.answer.slice(0, -1);
      render();
    }
  });

  function setMode(mode) {
    document.querySelectorAll('.mode-btn').forEach(function (x) {
      x.classList.toggle('active', x.getAttribute('data-mode') === mode);
    });
    els.overlay.classList.remove('show');
    state.mode = mode;
    state.streak = 0;
    if (mode === 'mastery') {
      startMastery();
    } else {
      if (state.mastery) state.mastery.running = false;
      stopTimer();
      els.masteryBar.classList.remove('show');
      els.timer.textContent = '0:00';
      newProblem();
    }
    updateHud();
  }

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(function (b) {
    b.addEventListener('click', function () { setMode(b.getAttribute('data-mode')); });
  });

  els.masteryRestart.addEventListener('click', function () {
    els.overlay.classList.remove('show');
    startMastery();
  });

  // Table select
  tbl.addEventListener('click', function (e) {
    var t = e.target;
    if (!t.matches('.table-btn')) return;
    tbl.querySelectorAll('.table-btn').forEach(function (x) { x.classList.remove('active'); });
    t.classList.add('active');
    state.focus = t.getAttribute('data-t');
    if (state.mode === 'mastery') {
      startMastery();
    } else {
      newProblem();
    }
  });

  updateHud();
  newProblem();
})();
</script>
<script src="../notes.js"></script>
</body>
</html>
