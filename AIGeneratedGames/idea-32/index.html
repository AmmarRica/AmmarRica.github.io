<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Texting & Driving</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a15;color:#eee;font-family:monospace;min-height:100vh;touch-action:manipulation;user-select:none}
body{max-width:480px;margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.top{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pane{background:#111;padding:8px;border-radius:8px}
h3{font-size:12px;color:#a78bfa;margin-bottom:6px}
#drive{aspect-ratio:.5;background:#333;position:relative;overflow:hidden;border-radius:4px}
#type{min-height:240px;display:flex;flex-direction:column;gap:6px}
.word{font-size:18px;color:#fbbf24;min-height:28px;letter-spacing:1px}
input{width:100%;padding:6px;background:#1a1a2e;color:#fff;border:1px solid #555;border-radius:4px;font-family:monospace;font-size:14px}
.keys{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:6px}
.keys button{padding:14px;background:#7c3aed;color:#fff;border:0;border-radius:6px;font-family:monospace;font-size:14px}
.stat{display:flex;justify-content:space-between;font-size:12px;background:#111;padding:6px;border-radius:4px}
</style></head><body>
<div class="stat"><span>Typed: <b id="tc">0</b></span><span>Crashes: <b id="cc">0</b></span><span>HP: <b id="hp">3</b></span></div>
<div class="top">
<div class="pane">
<h3>⌨ Typing</h3>
<div id="type">
<div class="word" id="word">—</div>
<input id="inp" autocomplete="off" placeholder="type here">
</div>
</div>
<div class="pane">
<h3>🚗 Drive</h3>
<div id="drive"><canvas id="c" width="200" height="400" style="width:100%;height:100%"></canvas></div>
</div>
</div>
<div class="keys">
<button id="bL">◀ Left</button>
<button id="bC">Center</button>
<button id="bR">Right ▶</button>
</div>
<script src="../notes.js"></script>
<script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
let car={x:W/2,lane:1},obs=[],hp=3,tc=0,cc=0,lanes=[W/4,W/2,W*3/4];
const wordList=['apple','brave','cloud','drive','eager','flame','grape','happy','ivory','jolly','knife','lemon','mango','night','ocean','pearl','quiet','river','stone','tiger','ultra','vivid','whale','yacht','zebra'];
let cur='',idx=0;
function pick(){cur=wordList[Math.floor(Math.random()*wordList.length)];document.getElementById('word').textContent=cur;document.getElementById('inp').value='';idx=0;}
document.getElementById('inp').addEventListener('input',e=>{
  const v=e.target.value;
  if(cur.startsWith(v)){idx=v.length;if(v===cur){tc++;pick();}}
  else{e.target.value=v.slice(0,-1);}
});
['bL','bC','bR'].forEach((id,i)=>{document.getElementById(id).onclick=()=>{car.lane=i;car.x=lanes[i];};});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){car.lane=Math.max(0,car.lane-1);car.x=lanes[car.lane];}if(e.key==='ArrowRight'){car.lane=Math.min(2,car.lane+1);car.x=lanes[car.lane];}});
setInterval(()=>{obs.push({x:lanes[Math.floor(Math.random()*3)],y:-30,w:40,h:60});},900);
function loop(){
  obs.forEach(o=>o.y+=4);
  obs=obs.filter(o=>o.y<H+100);
  obs.forEach(o=>{if(Math.abs(o.x-car.x)<30&&Math.abs(o.y-(H-60))<40&&!o.hit){o.hit=true;cc++;hp--;if(hp<=0){alert('Crashed! Typed '+tc+' words.');hp=3;cc=0;tc=0;}}});
  ctx.fillStyle='#333';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#fbbf24';ctx.setLineDash([10,10]);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/3,0);ctx.lineTo(W/3,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W*2/3,0);ctx.lineTo(W*2/3,H);ctx.stroke();
  ctx.setLineDash([]);
  obs.forEach(o=>{ctx.fillStyle=o.hit?'#666':'#ef4444';ctx.fillRect(o.x-20,o.y,o.w,o.h);});
  ctx.fillStyle='#22d3ee';ctx.fillRect(car.x-20,H-70,40,60);
  document.getElementById('tc').textContent=tc;document.getElementById('cc').textContent=cc;document.getElementById('hp').textContent=hp;
  requestAnimationFrame(loop);
}
pick();loop();
})();
</script>
</body></html>
