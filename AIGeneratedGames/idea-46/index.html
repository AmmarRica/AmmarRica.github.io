<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Joust</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a15;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#1a1a2e}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.c{display:flex;gap:6px;padding:6px}.btn{flex:1;padding:14px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:14px}
.btn:active{background:#7c3aed}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="520"></canvas>
<div id="hud"><span>Score: <b id="sc">0</b></span><span>Lives: <b id="lv">3</b></span></div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bF">FLAP</button>
<button class="btn" id="bR">▶</button>
</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const keys={};
let p,enemies,platforms,lives,score,running=true;
function reset(){
  p={x:W/2,y:100,vx:0,vy:0,w:20,h:20};
  platforms=[{x:0,y:H-20,w:W,h:20},{x:60,y:H-120,w:100,h:10},{x:W-160,y:H-120,w:100,h:10},{x:W/2-50,y:H-220,w:100,h:10},{x:80,y:H-320,w:80,h:10},{x:W-160,y:H-320,w:80,h:10}];
  enemies=[];for(let i=0;i<3;i++)enemies.push({x:Math.random()*W,y:100+Math.random()*200,vx:(Math.random()-.5)*2,vy:0,w:20,h:20,alive:true});
  lives=3;score=0;running=true;
}
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();flap();}else keys[e.key.toLowerCase()]=true;});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
document.getElementById('bF').addEventListener('pointerdown',flap);
function flap(){if(p&&p.vy>-5)p.vy-=5;}
function rectVs(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function step(o){
  o.vy+=.3;if(o.vy>8)o.vy=8;
  o.x+=o.vx;if(o.x<0){o.x=W;}if(o.x>W){o.x=0;}
  o.y+=o.vy;
  platforms.forEach(pl=>{if(rectVs(o,pl)){if(o.vy>0&&o.y+o.h-o.vy<=pl.y+2){o.y=pl.y-o.h;o.vy=0;}else{o.vy=0;}}});
}
function loop(){
  if(running){
    if(keys['a']||keys['arrowleft']||keys['bL'])p.vx=Math.max(-3,p.vx-.3);
    else if(keys['d']||keys['arrowright']||keys['bR'])p.vx=Math.min(3,p.vx+.3);
    else p.vx*=.96;
    step(p);
    enemies.forEach(e=>{if(!e.alive)return;step(e);if(Math.random()<.02)e.vy=-4;if(Math.random()<.02)e.vx=(Math.random()-.5)*3;});
    // combat: higher wins
    enemies.forEach(e=>{if(!e.alive)return;if(rectVs(p,e)){if(p.y<e.y-3){e.alive=false;score+=100;}else if(e.y<p.y-3){lives--;if(lives<=0){running=false;}else{p.x=W/2;p.y=100;p.vy=0;}}}});
    if(enemies.every(e=>!e.alive)){enemies=[];for(let i=0;i<3+Math.floor(score/300);i++)enemies.push({x:Math.random()*W,y:60+Math.random()*200,vx:(Math.random()-.5)*2.5,vy:0,w:20,h:20,alive:true});}
  }
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  platforms.forEach(pl=>{ctx.fillStyle='#555';ctx.fillRect(pl.x,pl.y,pl.w,pl.h);});
  enemies.forEach(e=>{if(!e.alive)return;ctx.fillStyle='#ef4444';ctx.fillRect(e.x,e.y,e.w,e.h);ctx.fillStyle='#fff';ctx.fillRect(e.x+e.w/2-2,e.y-6,4,6);});
  if(p){ctx.fillStyle='#22d3ee';ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle='#fbbf24';ctx.fillRect(p.x+p.w/2-2,p.y-8,4,8);}
  document.getElementById('sc').textContent=score;document.getElementById('lv').textContent=lives;
  if(!running){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='24px monospace';ctx.fillText('Game Over '+score,W/2-90,H/2);}
  requestAnimationFrame(loop);
}
reset();loop();
})();
</script><script src="../notes.js"></script></body></html>
