<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game a Day</title>
  <style>
    body {
      font-family: monospace;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    nav a { margin-right: 1rem; }
    .filter-bar { margin: 1rem 0; }
    .filter-bar button {
      background: none;
      border: 1px solid #999;
      padding: 0.2rem 0.6rem;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85rem;
    }
    .filter-bar button.active {
      background: #000;
      color: #fff;
    }
    h2 { margin-top: 1.5rem; font-size: 1.1rem; }
    ul { list-style: none; padding: 0; }
    li { padding: 0.15rem 0; }
    li.hidden { display: none; }
    .empty-msg { color: #999; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/blog/">Blog</a>
    <a href="/videogames-ishkur/">Videogames Ishkur</a>
    <a href="/AIGeneratedGames/"><strong>AI-Generated Games</strong></a>
    <a href="/game-stats/">Game Stats</a>
  </nav>

  <h1>Game a Day</h1>
  <p>One small game built every day.</p>

  <div class="filter-bar">
    Filter:
    <button class="active" data-filter="all">All</button>
    <button data-filter="mobile">Mobile-Friendly</button>
    <button data-filter="keyboard">Keyboard Only</button>
  </div>

  <div id="galleries"></div>

  <script>
    (function () {
      var currentFilter = 'all';

      var SECTIONS = [
        { series: 'specials',  title: 'Specials' },
        { series: 'daily',     title: 'Daily Games' },
        { series: 'ufo-like',  title: 'UFO-Like Games' },
        { series: 'football',  title: 'Football Games' },
        { series: 'charlotte', title: '3D Experiences' }
      ];

      function matchesFilter(input, filter) {
        if (filter === 'all') return true;
        if (filter === 'mobile') return input === 'touch' || input === 'both';
        if (filter === 'keyboard') return input === 'keyboard';
        return true;
      }

      function applyFilter() {
        document.querySelectorAll('li[data-input]').forEach(function (li) {
          li.classList.toggle('hidden', !matchesFilter(li.getAttribute('data-input'), currentFilter));
        });
        document.querySelectorAll('.game-section').forEach(function (sec) {
          var visible = sec.querySelectorAll('li:not(.hidden)').length;
          sec.querySelector('.empty-msg').style.display = visible === 0 ? '' : 'none';
        });
      }

      function buildGalleries(games) {
        var container = document.getElementById('galleries');

        SECTIONS.forEach(function (section) {
          var sectionGames = games.filter(function (g) { return g.series === section.series; });
          if (sectionGames.length === 0) return;

          var div = document.createElement('div');
          div.className = 'game-section';

          var h2 = document.createElement('h2');
          h2.textContent = section.title + ' (' + sectionGames.length + ')';
          div.appendChild(h2);

          var ul = document.createElement('ul');
          sectionGames.forEach(function (game) {
            var li = document.createElement('li');
            li.setAttribute('data-input', game.input);
            var a = document.createElement('a');
            a.href = game.dir + '/index.html';
            a.textContent = game.title;
            li.appendChild(a);
            ul.appendChild(li);
          });
          div.appendChild(ul);

          var emptyMsg = document.createElement('p');
          emptyMsg.className = 'empty-msg';
          emptyMsg.textContent = 'No games match this filter.';
          div.appendChild(emptyMsg);

          container.appendChild(div);
        });

        applyFilter();
      }

      document.querySelectorAll('.filter-bar button').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.filter-bar button').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          applyFilter();
        });
      });

      fetch('games.json')
        .then(function (r) { return r.json(); })
        .then(buildGalleries)
        .catch(function () {
          document.getElementById('galleries').innerHTML = '<p>Failed to load games.</p>';
        });
    })();
  </script>
</body>
</html>
