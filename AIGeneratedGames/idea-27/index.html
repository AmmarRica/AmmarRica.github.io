<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Parking Lot Survival</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#111;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#333}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.c{display:flex;gap:4px;padding:6px}.btn{flex:1;padding:12px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:13px}
.btn:active{background:#7c3aed}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="480"></canvas>
<div id="hud"><span>🔧 Parts: <b id="pt">0</b></span><span>❤ <b id="hp">5</b></span><span>🌙 Night <b id="nt">0</b></span></div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bU">▲</button>
<button class="btn" id="bD">▼</button>
<button class="btn" id="bR">▶</button>
<button class="btn" id="bA">Loot</button>
</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const keys={};
let p,cars,scavengers,camX=0,camY=0,parts,hp,night,nightT,dayT,running=true;
function gen(){
  cars=[];
  for(let i=0;i<200;i++){cars.push({x:(i%10)*100-200,y:Math.floor(i/10)*80-200,w:60,h:40,loot:Math.floor(Math.random()*3+1),open:false});}
  p={x:0,y:0,spd:2.5,r:10};hp=5;parts=0;night=0;nightT=0;dayT=60*60;scavengers=[];
}
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR','bU','bD'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
document.getElementById('bA').addEventListener('pointerdown',()=>{
  const near=cars.find(car=>!car.open&&Math.abs(p.x-(car.x+car.w/2))<40&&Math.abs(p.y-(car.y+car.h/2))<40);
  if(near){near.open=true;parts+=near.loot;}
});
function loop(){
  if(running){
    let dx=0,dy=0;
    if(keys['a']||keys['arrowleft']||keys['bL'])dx=-1;
    if(keys['d']||keys['arrowright']||keys['bR'])dx=1;
    if(keys['w']||keys['arrowup']||keys['bU'])dy=-1;
    if(keys['s']||keys['arrowdown']||keys['bD'])dy=1;
    const d=Math.hypot(dx,dy)||1;p.x+=dx/d*p.spd;p.y+=dy/d*p.spd;
    camX=p.x-W/2;camY=p.y-H/2;
    dayT--;nightT++;
    if(dayT<=0){night++;dayT=60*60;if(night%2===1){for(let i=0;i<3+night;i++)scavengers.push({x:p.x+(Math.random()-.5)*400,y:p.y+(Math.random()-.5)*400,r:10,hp:2,spd:1+night*.1});}}
    scavengers.forEach(s=>{
      const dx=p.x-s.x,dy=p.y-s.y,d=Math.hypot(dx,dy)||1;
      s.x+=dx/d*s.spd;s.y+=dy/d*s.spd;
      if(Math.hypot(p.x-s.x,p.y-s.y)<p.r+s.r){hp--;s.hp--;}
    });
    scavengers=scavengers.filter(s=>s.hp>0);
    if(hp<=0){running=false;}
    document.getElementById('pt').textContent=parts;
    document.getElementById('hp').textContent=hp;
    document.getElementById('nt').textContent=night;
  }
  ctx.fillStyle=night>0?'#1a1a2e':'#333';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(-camX,-camY);
  // visible cars only
  cars.forEach(car=>{
    if(car.x-camX>-100&&car.x-camX<W+100&&car.y-camY>-100&&car.y-camY<H+100){
      ctx.fillStyle=car.open?'#555':'#88a';
      ctx.fillRect(car.x,car.y,car.w,car.h);
      if(!car.open){ctx.fillStyle='#fbbf24';ctx.font='10px monospace';ctx.fillText('?'+car.loot,car.x+20,car.y+24);}
    }
  });
  scavengers.forEach(s=>{ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();});
  ctx.fillStyle='#22d3ee';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();
  ctx.restore();
  if(!running){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='20px monospace';ctx.fillText('Dead at night '+night,W/2-90,H/2);ctx.fillText('Parts: '+parts,W/2-50,H/2+30);}
  requestAnimationFrame(loop);
}
gen();loop();
})();
</script><script src="../notes.js"></script></body></html>
