<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Resource Gatherer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#3a2a14;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#4a3a2a}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:11px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.c{display:flex;gap:4px;padding:6px}.btn{flex:1;padding:12px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:12px}
.btn:active{background:#7c3aed}
.upg{padding:6px;background:#111;font-size:11px;text-align:center}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="420"></canvas>
<div id="hud"><span>🪨 <b id="st">0</b></span><span>⛏ <b id="ir">0</b></span><span>💎 <b id="di">0</b></span><span>Tier: <b id="tr">Stone</b></span></div>
<div class="upg">Tap resource to mine. Higher tier = need stronger pickaxe. Kill enemies to drop loot.</div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bU">▲</button>
<button class="btn" id="bD">▼</button>
<button class="btn" id="bR">▶</button>
<button class="btn" id="bA">Mine/Attack</button>
<button class="btn" id="bC">Craft</button>
</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const keys={};
let p={x:W/2,y:H/2,r:10,spd:2.2,hp:10,tier:0};
let resources=[],enemies=[],inv={st:0,ir:0,di:0,gd:0};
const tierNames=['Stone','Iron','Diamond','Gold'];
function genResources(){
  resources=[];
  for(let i=0;i<15;i++)resources.push({x:Math.random()*W,y:Math.random()*H,tier:0,hp:2,r:12});
  for(let i=0;i<10;i++)resources.push({x:Math.random()*W,y:Math.random()*H,tier:1,hp:4,r:12});
  for(let i=0;i<5;i++)resources.push({x:Math.random()*W,y:Math.random()*H,tier:2,hp:8,r:12});
}
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR','bU','bD'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
document.getElementById('bA').addEventListener('pointerdown',()=>{
  const r=resources.filter(r=>Math.hypot(p.x-r.x,p.y-r.y)<p.r+r.r+4).sort((a,b)=>Math.hypot(a.x-p.x,a.y-p.y)-Math.hypot(b.x-p.x,b.y-p.y))[0];
  if(r){if(r.tier>p.tier){return;}r.hp--;if(r.hp<=0){r.dead=true;const keys=['st','ir','di'];inv[keys[r.tier]]=(inv[keys[r.tier]]||0)+1;upd();}return;}
  const e=enemies.filter(e=>Math.hypot(p.x-e.x,p.y-e.y)<p.r+e.r+4)[0];
  if(e){e.hp--;if(e.hp<=0){e.dead=true;inv.gd=(inv.gd||0)+1;upd();}}
});
document.getElementById('bC').addEventListener('pointerdown',()=>{
  if(p.tier===0&&inv.st>=3){inv.st-=3;p.tier=1;upd();}
  else if(p.tier===1&&inv.ir>=3){inv.ir-=3;p.tier=2;upd();}
  else if(p.tier===2&&inv.di>=3){inv.di-=3;p.tier=3;upd();}
});
function upd(){document.getElementById('st').textContent=inv.st;document.getElementById('ir').textContent=inv.ir;document.getElementById('di').textContent=inv.di;document.getElementById('tr').textContent=tierNames[p.tier];}
setInterval(()=>{if(enemies.length<5)enemies.push({x:Math.random()<.5?-20:W+20,y:Math.random()*H,r:10,hp:3,spd:.8});},3000);
function loop(){
  let dx=0,dy=0;
  if(keys['a']||keys['arrowleft']||keys['bL'])dx=-1;
  if(keys['d']||keys['arrowright']||keys['bR'])dx=1;
  if(keys['w']||keys['arrowup']||keys['bU'])dy=-1;
  if(keys['s']||keys['arrowdown']||keys['bD'])dy=1;
  const m=Math.hypot(dx,dy)||1;p.x+=dx/m*p.spd;p.y+=dy/m*p.spd;
  p.x=Math.max(p.r,Math.min(W-p.r,p.x));p.y=Math.max(p.r,Math.min(H-p.r,p.y));
  enemies.forEach(e=>{const dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1;e.x+=dx/d*e.spd;e.y+=dy/d*e.spd;if(d<p.r+e.r){p.hp-=.01;}});
  resources=resources.filter(r=>!r.dead);enemies=enemies.filter(e=>!e.dead);
  if(resources.length<15)resources.push({x:Math.random()*W,y:Math.random()*H,tier:Math.floor(Math.random()*3),hp:2+Math.floor(Math.random()*3)*2,r:12});
  ctx.fillStyle='#4a3a2a';ctx.fillRect(0,0,W,H);
  resources.forEach(r=>{ctx.fillStyle=['#888','#aaa','#22d3ee','#fbbf24'][r.tier];ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,6.28);ctx.fill();ctx.fillStyle='#000';ctx.font='9px monospace';ctx.fillText(tierNames[r.tier][0],r.x-3,r.y+3);});
  enemies.forEach(e=>{ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,6.28);ctx.fill();});
  ctx.fillStyle=['#888','#fff','#22d3ee','#fbbf24'][p.tier];ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();
  requestAnimationFrame(loop);
}
genResources();upd();loop();
})();
</script><script src="../notes.js"></script></body></html>
