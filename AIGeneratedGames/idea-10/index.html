<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Shrunk Down</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#553;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#8a6d3b}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.c{display:flex;gap:6px;padding:6px}.btn{flex:1;padding:14px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:14px}
.btn:active{background:#7c3aed}
.msg{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center}
.msg.hide{display:none}.msg button{margin-top:8px;padding:10px 16px;background:#7c3aed;color:#fff;border:0;border-radius:6px;font-family:monospace}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="560"></canvas>
<div id="hud"><span id="h">Crumbs: 0/5</span><span id="info">Ant Platformer</span></div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bJ">Jump</button>
<button class="btn" id="bR">▶</button>
</div>
<div class="msg" id="msg"><div>Shrunk Down</div><div style="font-size:12px;margin:6px 10px">You're ant-sized. Jump across book, pencil, mug platforms. Avoid the water glass and falling crumbs. Collect 5 crumbs!</div><button id="start">Start</button></div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
let p,walls,crumbs,hazards,running=false,keys={},got;
function reset(){
  p={x:20,y:H-80,w:8,h:10,vx:0,vy:0,onG:false};
  // Household items as platforms: book (brown), pencil (yellow), mug (white), ruler, sponge
  walls=[
    {x:0,y:H-20,w:W,h:20,col:'#654321'},
    {x:60,y:H-80,w:120,h:16,col:'#8b4513'},// book
    {x:220,y:H-140,w:180,h:8,col:'#fbbf24'},// pencil
    {x:80,y:H-200,w:80,h:40,col:'#eee'},// mug
    {x:280,y:H-240,w:60,h:100,col:'#eee'},// mug tall
    {x:20,y:H-300,w:160,h:10,col:'#22c55e'},// ruler
    {x:260,y:H-360,w:200,h:12,col:'#fdd'}// sponge
  ];
  crumbs=[{x:100,y:H-100},{x:260,y:H-160},{x:110,y:H-240},{x:80,y:H-320},{x:360,y:H-380}];
  hazards=[{x:180,y:H-20,w:40,h:20,col:'#3b82f6'}];// water
  got=0;running=true;
}
document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' '){e.preventDefault();jump();}});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
document.getElementById('bJ').addEventListener('pointerdown',jump);
function jump(){if(p&&p.onG){p.vy=-9;p.onG=false;}}
function rectVs(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function loop(){
  if(running){
    let ax=0;
    if(keys['arrowleft']||keys['a']||keys['bL'])ax=-1;
    if(keys['arrowright']||keys['d']||keys['bR'])ax=1;
    p.vx=ax*2;p.vy+=.4;if(p.vy>10)p.vy=10;
    p.x+=p.vx;walls.forEach(w=>{if(rectVs(p,w)){if(p.vx>0)p.x=w.x-p.w;else if(p.vx<0)p.x=w.x+w.w;p.vx=0;}});
    p.y+=p.vy;p.onG=false;
    walls.forEach(w=>{if(rectVs(p,w)){if(p.vy>0){p.y=w.y-p.h;p.vy=0;p.onG=true;}else{p.y=w.y+w.h;p.vy=0;}}});
    hazards.forEach(h=>{if(rectVs(p,h)){running=false;showMsg('Drowned! Try again.');}});
    if(p.x<0)p.x=0;if(p.x>W-p.w)p.x=W-p.w;
    crumbs.forEach(cr=>{if(!cr.got&&Math.abs(p.x-cr.x)<8&&Math.abs(p.y-cr.y)<10){cr.got=true;got++;}});
    if(got>=5){running=false;showMsg('Feast complete!');}
    document.getElementById('h').textContent='Crumbs: '+got+'/5';
  }
  ctx.fillStyle='#8a6d3b';ctx.fillRect(0,0,W,H);
  walls.forEach(w=>{ctx.fillStyle=w.col;ctx.fillRect(w.x,w.y,w.w,w.h);});
  hazards.forEach(h=>{ctx.fillStyle=h.col;ctx.fillRect(h.x,h.y,h.w,h.h);});
  crumbs.forEach(cr=>{if(cr.got)return;ctx.fillStyle='#e0a060';ctx.beginPath();ctx.arc(cr.x,cr.y,4,0,6.28);ctx.fill();});
  if(p){ctx.fillStyle='#111';ctx.fillRect(p.x,p.y,p.w,p.h);}
  requestAnimationFrame(loop);
}
function showMsg(t){const m=document.getElementById('msg');m.firstChild.textContent=t;m.classList.remove('hide');}
document.getElementById('start').onclick=()=>{document.getElementById('msg').classList.add('hide');reset();};
loop();
})();
</script><script src="../notes.js"></script></body></html>
