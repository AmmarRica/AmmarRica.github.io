<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Cat Train Yard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#222;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#333}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.info{padding:6px 8px;font-size:11px;color:#aaa;text-align:center}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="480"></canvas>
<div id="hud"><span>Delivered: <b id="del">0</b></span><span>Crashes: <b id="cr">0</b></span></div>
<div class="info">Tap track switches (circles) to toggle. Cats wander onto tracks. Don't run them over!</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const tracks=[
  {y:100,switches:[{x:W/2,on:false}]},
  {y:200,switches:[{x:W/3,on:false},{x:2*W/3,on:false}]},
  {y:300,switches:[{x:W/2,on:false}]},
  {y:400,switches:[{x:W/3,on:false},{x:2*W/3,on:false}]}
];
let trains=[],cats=[],delivered=0,crashes=0;
setInterval(()=>{
  if(trains.length<4){
    const laneIdx=Math.floor(Math.random()*tracks.length);
    trains.push({x:-40,y:tracks[laneIdx].y,laneIdx,spd:1+Math.random()*1.5});
  }
},2500);
setInterval(()=>{
  if(cats.length<6){
    cats.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8});
  }
},1800);
c.addEventListener('pointerdown',e=>{
  const r=c.getBoundingClientRect();
  const x=(e.clientX-r.left)*W/r.width,y=(e.clientY-r.top)*H/r.height;
  tracks.forEach(t=>{t.switches.forEach(s=>{if(Math.hypot(s.x-x,t.y-y)<22)s.on=!s.on;});});
});
function loop(){
  trains.forEach(t=>{
    t.x+=t.spd;
    // check switches
    tracks[t.laneIdx].switches.forEach(s=>{
      if(t.x>s.x-4&&t.x<s.x+4&&s.on){
        const newIdx=(t.laneIdx+1)%tracks.length;t.laneIdx=newIdx;t.y=tracks[newIdx].y;
      }
    });
    if(t.x>W+40){delivered++;t.dead=true;}
    cats.forEach(ct=>{if(Math.abs(ct.x-t.x)<18&&Math.abs(ct.y-t.y)<16){crashes++;ct.dead=true;t.dead=true;}});
  });
  trains=trains.filter(t=>!t.dead);
  cats.forEach(ct=>{ct.x+=ct.vx;ct.y+=ct.vy;ct.vx+=(Math.random()-.5)*.1;ct.vy+=(Math.random()-.5)*.1;ct.vx=Math.max(-1.2,Math.min(1.2,ct.vx));ct.vy=Math.max(-1.2,Math.min(1.2,ct.vy));if(ct.x<0||ct.x>W)ct.vx*=-1;if(ct.y<20||ct.y>H-20)ct.vy*=-1;});
  cats=cats.filter(c=>!c.dead);
  ctx.fillStyle='#333';ctx.fillRect(0,0,W,H);
  tracks.forEach(t=>{
    ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,t.y);ctx.lineTo(W,t.y);ctx.stroke();
    for(let x=10;x<W;x+=20){ctx.strokeStyle='#654';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x,t.y-6);ctx.lineTo(x,t.y+6);ctx.stroke();}
    t.switches.forEach(s=>{ctx.fillStyle=s.on?'#fbbf24':'#666';ctx.beginPath();ctx.arc(s.x,t.y,10,0,6.28);ctx.fill();ctx.fillStyle='#000';ctx.font='10px monospace';ctx.fillText(s.on?'↕':'-',s.x-3,t.y+3);});
  });
  trains.forEach(t=>{ctx.fillStyle='#22d3ee';ctx.fillRect(t.x-16,t.y-10,32,20);ctx.fillStyle='#000';ctx.fillRect(t.x-14,t.y-8,4,6);});
  cats.forEach(ct=>{ctx.fillStyle='#d97706';ctx.beginPath();ctx.arc(ct.x,ct.y,8,0,6.28);ctx.fill();ctx.fillStyle='#000';ctx.fillRect(ct.x-4,ct.y-10,2,4);ctx.fillRect(ct.x+2,ct.y-10,2,4);});
  document.getElementById('del').textContent=delivered;document.getElementById('cr').textContent=crashes;
  requestAnimationFrame(loop);
}
loop();
})();
</script><script src="../notes.js"></script></body></html>
