<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Search Party</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a15;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#1a1a2e}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.c{display:flex;gap:6px;padding:6px}.btn{flex:1;padding:12px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:12px}
.btn:active{background:#7c3aed}
.info{padding:4px;font-size:10px;color:#aaa;text-align:center}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="480"></canvas>
<div id="hud"><span>Role: <b id="rl">Hider</b></span><span>Time: <b id="tm">60</b>s</span></div>
<div class="info">You hide in the crowd. AI seeker uses heat detection. Try to blend in — don't move too much!</div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bU">▲</button>
<button class="btn" id="bD">▼</button>
<button class="btn" id="bR">▶</button>
</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const keys={};
let p,npcs,seeker,time=60,tLast=Date.now(),running=true,heat=0;
function reset(){
  p={x:W/2,y:H/2,r:10,vx:0,vy:0};
  npcs=[];for(let i=0;i<40;i++)npcs.push({x:Math.random()*W,y:Math.random()*H,r:10,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,col:'#'+[(100+Math.random()*100|0).toString(16),(100+Math.random()*100|0).toString(16),(100+Math.random()*100|0).toString(16)].join('')});
  seeker={x:W-40,y:40,r:14,state:'scan',scanAng:0,scanRad:140};
  time=60;tLast=Date.now();heat=0;running=true;
}
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR','bU','bD'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
function loop(){
  if(running){
    const now=Date.now();if(now-tLast>=1000){tLast=now;time--;if(time<=0){running=false;}}
    let dx=0,dy=0;
    if(keys['a']||keys['arrowleft']||keys['bL'])dx=-1;
    if(keys['d']||keys['arrowright']||keys['bR'])dx=1;
    if(keys['w']||keys['arrowup']||keys['bU'])dy=-1;
    if(keys['s']||keys['arrowdown']||keys['bD'])dy=1;
    const m=Math.hypot(dx,dy)||1;p.x+=dx/m*1.6;p.y+=dy/m*1.6;
    // heat based on movement
    if(dx||dy)heat=Math.min(100,heat+1);else heat=Math.max(0,heat-.5);
    p.x=Math.max(p.r,Math.min(W-p.r,p.x));p.y=Math.max(p.r,Math.min(H-p.r,p.y));
    npcs.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;if(Math.random()<.01){n.vx=(Math.random()-.5)*.8;n.vy=(Math.random()-.5)*.8;}});
    // seeker scans
    seeker.scanAng+=.02;
    seeker.x=W/2+Math.cos(seeker.scanAng*.3)*180;
    seeker.y=H/2+Math.sin(seeker.scanAng*.4)*180;
    // if player moves too much and within scan, caught
    const dd=Math.hypot(seeker.x-p.x,seeker.y-p.y);
    if(dd<seeker.scanRad&&heat>30){running=false;}
  }
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // seeker scan cone
  ctx.fillStyle='rgba(239,68,68,.1)';ctx.beginPath();ctx.arc(seeker.x,seeker.y,seeker.scanRad,0,6.28);ctx.fill();
  npcs.forEach(n=>{ctx.fillStyle=n.col;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,6.28);ctx.fill();});
  // player - shows red when moving (heat)
  ctx.fillStyle=heat>30?'#ef4444':'#22d3ee';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(seeker.x,seeker.y,seeker.r,0,6.28);ctx.fill();
  document.getElementById('tm').textContent=time;document.getElementById('rl').textContent='Hider (heat '+Math.floor(heat)+')';
  if(!running){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='24px monospace';ctx.fillText(time<=0?'Escaped!':'Spotted!',W/2-70,H/2);}
  requestAnimationFrame(loop);
}
reset();loop();
})();
</script><script src="../notes.js"></script></body></html>
