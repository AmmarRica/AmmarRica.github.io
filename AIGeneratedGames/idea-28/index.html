<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Woodsman Lantern</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:#eee;font-family:monospace;overflow:hidden;touch-action:none;user-select:none}
#wrap{max-width:480px;margin:0 auto;position:relative}canvas{display:block;width:100%;background:#0a0a15}
#hud{position:absolute;top:4px;left:8px;right:8px;font-size:12px;pointer-events:none;text-shadow:1px 1px #000;display:flex;justify-content:space-between}
.c{display:flex;gap:4px;padding:6px}.btn{flex:1;padding:12px;background:#2a2a44;color:#fff;border:1px solid #555;border-radius:6px;font-family:monospace;font-size:12px}
.btn:active{background:#7c3aed}
.fuelbar{position:absolute;top:24px;left:10px;right:10px;height:6px;background:#222;border-radius:3px;overflow:hidden}
.fuelbar .f{height:100%;background:#fbbf24;width:100%;transition:width .2s}
</style></head><body><div id="wrap">
<canvas id="c" width="480" height="480"></canvas>
<div id="hud"><span>🔥 Fuel: <b id="fl">100</b></span><span>🪵 Wood: <b id="wd">0</b></span></div>
<div class="fuelbar"><div class="f" id="fbar"></div></div>
<div class="c">
<button class="btn" id="bL">◀</button>
<button class="btn" id="bU">▲</button>
<button class="btn" id="bD">▼</button>
<button class="btn" id="bR">▶</button>
<button class="btn" id="bA">Chop/Refuel</button>
</div>
</div><script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const keys={};
let p,trees,lantern,fuel,wood,camX,camY,running=true;
function gen(){
  p={x:0,y:0,r:10,spd:2};
  trees=[];for(let i=0;i<60;i++){trees.push({x:(Math.random()-.5)*1200,y:(Math.random()-.5)*1200,hp:3});}
  lantern={x:0,y:100};fuel=100;wood=0;camX=p.x-W/2;camY=p.y-H/2;
}
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
['bL','bR','bU','bD'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('pointerdown',()=>keys[id]=true);el.addEventListener('pointerup',()=>keys[id]=false);});
document.getElementById('bA').addEventListener('pointerdown',()=>{
  // if near lantern, refuel using 1 wood = +20 fuel
  if(Math.hypot(p.x-lantern.x,p.y-lantern.y)<30&&wood>0){wood--;fuel=Math.min(100,fuel+20);return;}
  // else chop nearest tree
  const t=trees.filter(t=>t.hp>0).sort((a,b)=>Math.hypot(a.x-p.x,a.y-p.y)-Math.hypot(b.x-p.x,b.y-p.y))[0];
  if(t&&Math.hypot(t.x-p.x,t.y-p.y)<30){t.hp--;if(t.hp<=0){wood++;}}
});
function loop(){
  if(running){
    let dx=0,dy=0;
    if(keys['a']||keys['arrowleft']||keys['bL'])dx=-1;
    if(keys['d']||keys['arrowright']||keys['bR'])dx=1;
    if(keys['w']||keys['arrowup']||keys['bU'])dy=-1;
    if(keys['s']||keys['arrowdown']||keys['bD'])dy=1;
    const d=Math.hypot(dx,dy)||1;p.x+=dx/d*p.spd;p.y+=dy/d*p.spd;
    camX=p.x-W/2;camY=p.y-H/2;
    fuel-=.05;
    if(fuel<=0){running=false;}
    document.getElementById('fl').textContent=Math.floor(fuel);
    document.getElementById('wd').textContent=wood;
    document.getElementById('fbar').style.width=fuel+'%';
  }
  ctx.fillStyle='#0a0a15';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(-camX,-camY);
  // lantern light
  const lx=lantern.x,ly=lantern.y,radius=fuel*4;
  const g=ctx.createRadialGradient(lx,ly,5,lx,ly,radius);
  g.addColorStop(0,'rgba(251,191,36,.9)');g.addColorStop(.7,'rgba(251,191,36,.2)');g.addColorStop(1,'rgba(251,191,36,0)');
  ctx.fillStyle=g;ctx.fillRect(lx-radius,ly-radius,radius*2,radius*2);
  // player flashlight (smaller)
  const pr=60;
  const g2=ctx.createRadialGradient(p.x,p.y,5,p.x,p.y,pr);
  g2.addColorStop(0,'rgba(200,200,255,.4)');g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2;ctx.fillRect(p.x-pr,p.y-pr,pr*2,pr*2);
  // trees (visible only within lantern or player light)
  trees.forEach(t=>{
    if(t.hp<=0)return;
    const dLan=Math.hypot(t.x-lx,t.y-ly),dP=Math.hypot(t.x-p.x,t.y-p.y);
    if(dLan<radius||dP<pr){
      ctx.fillStyle='#2d5a1e';ctx.beginPath();ctx.arc(t.x,t.y,10,0,6.28);ctx.fill();
      ctx.fillStyle='#654321';ctx.fillRect(t.x-3,t.y,6,10);
    }
  });
  // lantern
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(lx,ly,8,0,6.28);ctx.fill();
  // player
  ctx.fillStyle='#22d3ee';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();
  ctx.restore();
  if(!running){ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='22px monospace';ctx.fillText('The light died',W/2-100,H/2);ctx.fillText('Wood: '+wood,W/2-60,H/2+30);}
  requestAnimationFrame(loop);
}
gen();loop();
})();
</script><script src="../notes.js"></script></body></html>
